<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questerra — A Space to Create</title>
<meta name="description" content="Questerra is a space to create, explore, and bring ideas to life.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0C0B09;
  --bg-subtle: #141210;
  --warm: #E8DCC8;
  --warm-dim: #9C9080;
  --warm-faint: rgba(232,220,200,0.06);
  --accent: #C8926C;
  --accent-glow: #D4A882;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--warm);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ====== GRAIN ====== */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.4;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
}

/* ====== AMBIENT LIGHT ====== */
.glow {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(120px);
  opacity: 0;
  animation: glowIn 3s ease 0.5s forwards;
}
.glow-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(200,146,108,0.07) 0%, transparent 70%);
  top: -200px; right: -100px;
}
.glow-2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(200,146,108,0.04) 0%, transparent 70%);
  bottom: -100px; left: -150px;
  animation-delay: 1s;
}
.glow-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(232,220,200,0.03) 0%, transparent 70%);
  top: 40%; left: 20%;
  animation-delay: 1.5s;
}
@keyframes glowIn {
  to { opacity: 1; }
}

/* ====== LAYOUT ====== */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ====== NAV ====== */
nav {
  padding: 28px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  animation: fadeDown 1s ease 0.2s forwards;
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  color: var(--warm);
  letter-spacing: 0.5px;
  text-decoration: none;
}
.logo em {
  font-style: italic;
  color: var(--accent);
}
.nav-tag {
  font-size: 0.75rem;
  color: var(--warm-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
}

/* ====== HERO ====== */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 40px 120px;
  text-align: center;
}

.hero-pre {
  font-size: 0.8rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--warm-dim);
  font-weight: 500;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 1s ease 0.6s forwards;
}

.hero-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(3rem, 10vw, 7.5rem);
  font-weight: 400;
  line-height: 1.0;
  color: var(--warm);
  margin-bottom: 12px;
  opacity: 0;
  animation: fadeUp 1s ease 0.8s forwards;
}
.hero-title em {
  font-style: italic;
  color: var(--accent);
  position: relative;
}
.hero-title em::after {
  content: '';
  position: absolute;
  bottom: 0.08em;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--accent);
  opacity: 0.3;
}

.hero-sub {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: var(--warm-dim);
  font-weight: 400;
  max-width: 480px;
  line-height: 1.6;
  margin-top: 20px;
  opacity: 0;
  animation: fadeUp 1s ease 1.1s forwards;
}

/* ====== DIVIDER LINE ====== */
.divider {
  width: 1px;
  height: 80px;
  background: linear-gradient(to bottom, transparent, var(--warm-dim), transparent);
  margin: 0 auto 32px;
  opacity: 0;
  animation: fadeUp 1s ease 1.4s forwards;
}

/* ====== BOTTOM WORDS ====== */
.bottom-words {
  display: flex;
  justify-content: center;
  gap: 48px;
  padding-bottom: 60px;
  opacity: 0;
  animation: fadeUp 1s ease 1.6s forwards;
}
.bw {
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--warm-dim);
  font-weight: 500;
  position: relative;
}
.bw::before {
  content: '';
  position: absolute;
  top: 50%;
  left: -28px;
  width: 8px;
  height: 1px;
  background: var(--warm-dim);
  opacity: 0.4;
}
.bw:first-child::before { display: none; }

/* ====== CURSOR DOT (desktop only) ====== */
.cursor-dot {
  position: fixed;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,146,108,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transform: translate(-50%, -50%);
  transition: left 0.5s ease, top 0.5s ease;
  display: none;
}
@media (hover: hover) {
  .cursor-dot { display: block; }
}

/* ====== ANIMATIONS ====== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ====== RESPONSIVE ====== */
@media (max-width: 600px) {
  nav { padding: 20px 24px; }
  .hero { padding: 0 24px 80px; }
  .bottom-words { gap: 28px; flex-wrap: wrap; justify-content: center; }
  .bw::before { display: none; }
  .nav-tag { display: none; }
}
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>
<div class="cursor-dot" id="cursorDot"></div>

<div class="page">
  <nav>
    <a href="/" class="logo">Quest<em>erra</em></a>
    <span class="nav-tag">A Space to Create</span>
  </nav>

  <main class="hero">
    <div class="hero-pre">Welcome to</div>
    <h1 class="hero-title">Quest<em>erra</em></h1>
    <p class="hero-sub">A space to create, explore, and bring ideas to life — where curiosity meets craft and every project begins with a question.</p>
  </main>

  <div class="divider"></div>

  <div class="bottom-words">
    <span class="bw">Create</span>
    <span class="bw">Explore</span>
    <span class="bw">Build</span>
  </div>
</div>

<script>
// Subtle cursor glow effect
const dot = document.getElementById('cursorDot');
if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', e => {
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
  });
}
</script>
</body>
</html>
