<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="180" y1="80" x2="220" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="25"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="sparks"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="140" rx="120" ry="90" fill="url(#glow)" filter="url(#blur1)"/>
  <!-- Steel bench -->
  <rect x="0" y="215" width="400" height="85" fill="#1e293b"/>
  <rect x="0" y="215" width="400" height="3" fill="#334155"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
  <!-- Bench vise (main subject) -->
  <g transform="translate(200,155)" filter="url(#shadow)">
    <!-- Fixed jaw -->
    <rect x="-35" y="-40" width="18" height="80" rx="2" fill="url(#steel)"/>
    <rect x="-35" y="-38" width="18" height="4" rx="1" fill="white" opacity="0.1"/>
    <!-- Jaw face serrations -->
    <line x1="-33" y1="-20" x2="-19" y2="-20" stroke="#64748b" stroke-width="1"/>
    <line x1="-33" y1="-12" x2="-19" y2="-12" stroke="#64748b" stroke-width="1"/>
    <line x1="-33" y1="-4" x2="-19" y2="-4" stroke="#64748b" stroke-width="1"/>
    <line x1="-33" y1="4" x2="-19" y2="4" stroke="#64748b" stroke-width="1"/>
    <line x1="-33" y1="12" x2="-19" y2="12" stroke="#64748b" stroke-width="1"/>
    <!-- Moving jaw -->
    <rect x="15" y="-40" width="18" height="80" rx="2" fill="url(#steel)"/>
    <line x1="17" y1="-20" x2="31" y2="-20" stroke="#64748b" stroke-width="1"/>
    <line x1="17" y1="-12" x2="31" y2="-12" stroke="#64748b" stroke-width="1"/>
    <line x1="17" y1="-4" x2="31" y2="-4" stroke="#64748b" stroke-width="1"/>
    <line x1="17" y1="4" x2="31" y2="4" stroke="#64748b" stroke-width="1"/>
    <!-- Screw bar -->
    <rect x="-15" y="-5" width="28" height="10" rx="3" fill="#475569"/>
    <!-- Screw thread lines -->
    <line x1="-12" y1="-2" x2="-12" y2="2" stroke="#334155" stroke-width="1"/>
    <line x1="-6" y1="-2" x2="-6" y2="2" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="-2" x2="0" y2="2" stroke="#334155" stroke-width="1"/>
    <line x1="6" y1="-2" x2="6" y2="2" stroke="#334155" stroke-width="1"/>
    <!-- Handle -->
    <rect x="35" y="-3" width="40" height="6" rx="3" fill="#475569"/>
    <circle cx="75" cy="0" r="5" fill="#64748b" stroke="#94a3b8" stroke-width="1"/>
    <!-- Base -->
    <rect x="-40" y="40" width="75" height="15" rx="3" fill="#334155"/>
    <rect x="-40" y="40" width="75" height="3" rx="1" fill="#475569"/>
    <!-- Metal piece in jaws -->
    <rect x="-15" y="-30" width="28" height="20" rx="1" fill="#78716c"/>
    <rect x="-15" y="-30" width="28" height="2" fill="#a8a29e" opacity="0.3"/>
  </g>
  <!-- Spark effects -->
  <g filter="url(#sparks)">
    <circle cx="175" cy="120" r="2" fill="#fbbf24" opacity="0.8"/>
    <circle cx="185" cy="108" r="1.5" fill="#f97316" opacity="0.7"/>
    <circle cx="168" cy="115" r="1" fill="#fde68a" opacity="0.9"/>
    <circle cx="190" cy="125" r="1.5" fill="#fb923c" opacity="0.6"/>
    <circle cx="178" cy="105" r="1" fill="#fbbf24" opacity="0.5"/>
  </g>
  <!-- File (blurred, left) -->
  <g transform="translate(65,190) rotate(-20)" filter="url(#blur2)" opacity="0.4">
    <rect x="-5" y="-50" width="10" height="70" rx="1" fill="#64748b"/>
    <rect x="-3" y="20" width="6" height="25" rx="2" fill="#78350f"/>
  </g>
  <circle cx="220" cy="90" r="1" fill="#f97316" opacity="0.5"/>
</svg>