<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="170" y1="70" x2="240" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="plastic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="135" rx="130" ry="95" fill="url(#glow)" filter="url(#blur1)"/>
  <!-- Bench -->
  <rect x="0" y="215" width="400" height="85" fill="#1e293b"/>
  <rect x="0" y="215" width="400" height="3" fill="#334155"/>
  <!-- Heat gun (main subject) -->
  <g transform="translate(195,140)" filter="url(#shadow)">
    <!-- Body -->
    <rect x="-25" y="-20" width="70" height="40" rx="8" fill="#475569"/>
    <rect x="-25" y="-18" width="70" height="4" rx="2" fill="#64748b" opacity="0.4"/>
    <!-- Nozzle -->
    <rect x="45" y="-14" width="30" height="28" rx="3" fill="#334155"/>
    <rect x="75" y="-10" width="8" height="20" rx="2" fill="#1e293b"/>
    <ellipse cx="79" cy="0" rx="5" ry="12" fill="#0f172a" opacity="0.6"/>
    <!-- Heat waves from nozzle -->
    <path d="M88-8 Q95-12 88-16" stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M92-6 Q100-10 92-14" stroke="#fb923c" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M96-4 Q105-8 96-12" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.25"/>
    <path d="M88 8 Q95 12 88 16" stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M92 6 Q100 10 92 14" stroke="#fb923c" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Handle -->
    <path d="M-15 20 L-20 55 C-21 62 -5 62 -4 55 L0 20" fill="#334155" stroke="#475569" stroke-width="1"/>
    <rect x="-18" y="30" width="12" height="3" rx="1" fill="#1e293b" opacity="0.3"/>
    <rect x="-17" y="38" width="10" height="3" rx="1" fill="#1e293b" opacity="0.3"/>
    <!-- Trigger -->
    <rect x="-8" y="22" width="8" height="15" rx="2" fill="#f97316"/>
    <!-- Controls -->
    <circle cx="10" cy="-5" r="4" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <circle cx="10" cy="5" r="4" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <circle cx="10" cy="-5" r="2" fill="#22c55e" opacity="0.8"/>
  </g>
  <!-- Acrylic sheet (bent, blurred left) -->
  <g transform="translate(60,185)" filter="url(#blur2)" opacity="0.45">
    <path d="M-25 0 L25 0 L25-10 Q30-25 35-25 L50-25 L50-30 L-25-5 Z" fill="url(#plastic)" opacity="0.6"/>
    <path d="M-25 0 L25 0 L25-10 Q30-25 35-25 L50-25" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  <!-- Plastic pellets (right, blurred) -->
  <g transform="translate(340,200)" filter="url(#blur2)" opacity="0.4">
    <circle cx="-5" cy="0" r="4" fill="#c4b5fd"/>
    <circle cx="5" cy="-3" r="3.5" fill="#a78bfa"/>
    <circle cx="0" cy="6" r="3" fill="#8b5cf6"/>
    <circle cx="10" cy="4" r="3.5" fill="#c4b5fd" opacity="0.7"/>
    <circle cx="-8" cy="8" r="3" fill="#a78bfa" opacity="0.6"/>
  </g>
  <circle cx="165" cy="90" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="240" cy="80" r="1" fill="#c4b5fd" opacity="0.3"/>
</svg>