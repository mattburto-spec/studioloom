<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudioLoom — Teacher Dashboard · Editorial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --paper: #F6EFE3;
      --paper-dark: #EDE3D1;
      --ink: #1A1A2E;
      --ink-muted: #8B7E6A;
      --rule: #D6C9B0;
    }
    body { font-family: 'Work Sans', system-ui, sans-serif; background: var(--paper); color: var(--ink); }
    .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
    .serif-it { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; }
    .hand { font-family: 'Caveat', cursive; font-weight: 600; }
    .small-caps { text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; }
    .rule { border-top: 1px solid var(--rule); }
    .rule-ink { border-top: 1px solid var(--ink); }
    .ink-btn { background: var(--ink); color: var(--paper); font-weight: 700; letter-spacing: 0.02em; }
    .ink-btn:hover { background: #2d2d4a; }
    .paper-grain { background-image: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.015) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(0,0,0,0.015) 0%, transparent 40%); }
    /* subtle paper texture */
    .texture::before {
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.04; mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }
    .pulse-dot { position: relative; display: inline-block; }
    .pulse-dot::after {
      content: ""; position: absolute; inset: -4px; border-radius: 999px; border: 2px solid currentColor; opacity: 0;
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 0; transform: scale(1.6); } }
    .scribble { filter: drop-shadow(0 1px 0 rgba(26,26,46,0.1)); }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="paper-grain">
  <div id="root"></div>
  <script type="text/babel" src="teacher_editorial.jsx"></script>
</body>
</html>
