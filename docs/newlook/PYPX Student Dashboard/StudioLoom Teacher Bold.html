<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudioLoom — Teacher Dashboard · Bold</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Unbounded:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Syne:wght@400;500;600;700;800&family=Archivo:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --ink: #0A0A0A;
      --ink-2: #3A3A3A;
      --ink-3: #6B6B6B;
      --hair: #E8E6DF;
    }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
    .display, .display-lg { font-family: var(--display-font, 'Manrope'), system-ui, sans-serif; letter-spacing: var(--display-tracking, -0.04em); font-weight: 700; }
    .display { letter-spacing: var(--display-tracking, -0.03em); }
    .tnum { font-variant-numeric: tabular-nums; }
    .cap { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; font-size: 10.5px; }
    .card-shadow { box-shadow: 0 1px 2px rgba(10,10,10,0.04), 0 8px 24px -12px rgba(10,10,10,0.08); }
    .card-shadow-lg { box-shadow: 0 1px 2px rgba(10,10,10,0.04), 0 16px 48px -20px rgba(10,10,10,0.18); }
    .ring-live { box-shadow: 0 0 0 4px rgba(14,165,164,0.18); }
    /* subtle inner glow on color cards */
    .glow-inner::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
      background: radial-gradient(circle at 20% 15%, rgba(255,255,255,0.28), transparent 55%);
    }
    .pulse {
      display: inline-block; width: 8px; height: 8px; border-radius: 999px; position: relative; background: currentColor;
    }
    .pulse::after {
      content: ""; position: absolute; inset: -6px; border-radius: 999px; border: 2px solid currentColor; opacity: 0;
      animation: ring 2s ease-out infinite;
    }
    @keyframes ring { 0% { opacity: 0.6; transform: scale(0.6);} 100% { opacity: 0; transform: scale(1.8);} }
    .btn-primary {
      background: var(--ink); color: white; font-weight: 700; letter-spacing: -0.01em;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px -12px rgba(10,10,10,0.35); }
    .btn-ghost { color: var(--ink); font-weight: 600; }
    .btn-ghost:hover { background: rgba(10,10,10,0.05); }
    details > summary::-webkit-details-marker { display: none; }
    details > summary { list-style: none; }
    .hscroll::-webkit-scrollbar { height: 6px; }
    .hscroll::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 999px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="teacher_bold.jsx"></script>
</body>
</html>
