<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Discovery Engine — Another World Transitions Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --station-0: #7B2FF2; /* purple — Identity */
    --station-1: #F97316; /* orange — Campfire */
    --station-2: #F59E0B; /* amber — Workshop */
    --station-3: #14B8A6; /* teal — Collection Wall */
    --station-4: #3B82F6; /* blue — Window */
    --station-5: #10B981; /* emerald — Toolkit */
    --station-6: #8B5CF6; /* violet — Crossroads */
    --station-7: #F43F5E; /* rose — Launchpad */
  }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }

  /* ─── Controls ─────────────────────────────────────────── */
  .controls {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .controls h1 {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-right: auto;
  }
  .controls button {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .controls button.active {
    background: rgba(123, 47, 242, 0.3);
    border-color: rgba(123, 47, 242, 0.6);
    color: #fff;
  }

  /* ─── Cinema Frame ─────────────────────────────────────── */
  .cinema {
    position: fixed;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    /* Letterbox bars for cinematic ratio */
  }
  .letterbox-top, .letterbox-bottom {
    position: absolute;
    left: 0;
    right: 0;
    background: #000;
    z-index: 50;
    transition: height 0.8s ease;
  }
  .letterbox-top { top: 0; height: 12%; }
  .letterbox-bottom { bottom: 0; height: 12%; }
  .cinema.wide .letterbox-top { height: 0; }
  .cinema.wide .letterbox-bottom { height: 0; }

  /* ─── Scene Container ──────────────────────────────────── */
  .scene {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* ─── Parallax Layers ──────────────────────────────────── */
  .layer {
    position: absolute;
    inset: 0;
    will-change: transform;
    transition: transform 6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .layer.sky { z-index: 1; }
  .layer.far { z-index: 2; }
  .layer.mid { z-index: 3; }
  .layer.near { z-index: 4; }
  .layer.ground { z-index: 5; }
  .layer.characters { z-index: 6; }
  .layer.foreground { z-index: 7; }
  .layer.overlay { z-index: 8; }

  /* Parallax pan amounts when .pan-right is toggled */
  .scene.pan-right .layer.sky       { transform: translateX(-2%); }
  .scene.pan-right .layer.far       { transform: translateX(-5%); }
  .scene.pan-right .layer.mid       { transform: translateX(-10%); }
  .scene.pan-right .layer.near      { transform: translateX(-16%); }
  .scene.pan-right .layer.ground    { transform: translateX(-20%); }
  .scene.pan-right .layer.characters{ transform: translateX(-20%); }
  .scene.pan-right .layer.foreground{ transform: translateX(-30%); }

  /* ─── SVG Elements ─────────────────────────────────────── */
  svg { width: 100%; height: 100%; }

  /* ─── Kit Character ────────────────────────────────────── */
  .kit-silhouette {
    position: absolute;
    bottom: 22%;
    left: 35%;
    width: 60px;
    height: 120px;
    transition: all 4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .scene.pan-right .kit-silhouette {
    left: 55%;
  }
  /* Walk cycle animation */
  @keyframes walk {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-4px) rotate(1deg); }
    50% { transform: translateY(0) rotate(0deg); }
    75% { transform: translateY(-4px) rotate(-1deg); }
  }
  .kit-silhouette.walking {
    animation: walk 0.6s ease-in-out infinite;
  }

  /* ─── Fade overlay for scene transitions ───────────────── */
  .fade-overlay {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 90;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .fade-overlay.active { opacity: 1; }

  /* ─── Kit Dialogue ─────────────────────────────────────── */
  .dialogue {
    position: absolute;
    bottom: 14%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    max-width: 600px;
    width: 90%;
    text-align: center;
    opacity: 0;
    transition: opacity 1s ease 2s;
    pointer-events: none;
  }
  .dialogue.visible { opacity: 1; }
  .dialogue p {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    line-height: 1.6;
    font-style: italic;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    letter-spacing: 0.3px;
  }
  .dialogue .speaker {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
    font-style: normal;
  }

  /* ─── Station Label ────────────────────────────────────── */
  .station-label {
    position: absolute;
    top: 14%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease 3s;
    pointer-events: none;
  }
  .station-label.visible { opacity: 1; }
  .station-label .next-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 6px;
  }
  .station-label .name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* ─── Particle / ambient effects ───────────────────────── */
  @keyframes float-particle {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-200px) translateX(30px); opacity: 0; }
  }
  .particles {
    position: absolute;
    inset: 0;
    z-index: 9;
    overflow: hidden;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float-particle linear infinite;
  }

  /* ─── Light shaft effect ───────────────────────────────── */
  @keyframes light-shaft {
    0% { opacity: 0; transform: translateX(-20px) skewX(-5deg); }
    50% { opacity: 0.08; }
    100% { opacity: 0; transform: translateX(20px) skewX(-5deg); }
  }
  .light-shaft {
    position: absolute;
    width: 120px;
    height: 100%;
    z-index: 8;
    animation: light-shaft 8s ease-in-out infinite;
    pointer-events: none;
  }

  /* ─── Continue prompt ──────────────────────────────────── */
  @keyframes pulse-continue {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  .continue-prompt {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 70;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    animation: pulse-continue 2s ease-in-out infinite;
    opacity: 0;
    transition: opacity 1s ease 4.5s;
    cursor: pointer;
  }
  .continue-prompt.visible { opacity: 1; animation: pulse-continue 2s ease-in-out infinite; }

  /* ─── Scanlines (Another World CRT feel) ───────────────── */
  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 95;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    opacity: 0.5;
  }
</style>
</head>
<body>

<!-- Controls -->
<div class="controls">
  <h1>Another World Transitions — Discovery Engine</h1>
  <button onclick="playTransition(0)" class="active">0→1 Campfire</button>
  <button onclick="playTransition(1)">1→2 Workshop</button>
  <button onclick="playTransition(2)">2→3 Collection</button>
  <button onclick="playTransition(3)">3→4 Window</button>
  <button onclick="playTransition(4)">4→5 Toolkit</button>
  <button onclick="playTransition(5)">5→6 Crossroads</button>
  <button onclick="playTransition(6)">6→7 Launchpad</button>
</div>

<!-- Cinema Frame -->
<div class="cinema" id="cinema">
  <div class="letterbox-top"></div>
  <div class="letterbox-bottom"></div>

  <!-- Scene container — all parallax layers go here -->
  <div class="scene" id="scene">
    <!-- Layers injected by JS per transition -->
  </div>

  <!-- Fade overlay -->
  <div class="fade-overlay" id="fade"></div>

  <!-- Scanlines -->
  <div class="scanlines"></div>

  <!-- Kit's dialogue -->
  <div class="dialogue" id="dialogue">
    <div class="speaker">Kit</div>
    <p id="dialogue-text"></p>
  </div>

  <!-- Next station label -->
  <div class="station-label" id="station-label">
    <div class="next-label">Next</div>
    <div class="name" id="station-name"></div>
  </div>

  <!-- Continue prompt -->
  <div class="continue-prompt" id="continue" onclick="advanceScene()">
    Click to continue ▸
  </div>
</div>

// Style: flat polygon silhouettes, limited palette, Another World aesthetic.

  const fromC = from.color;
  const toC = to.color;

        <!-- Ground plane -->

      particles: { color: toC, count: 6, style: 'firefly' },

    collection_to_window: {
      sky: `<svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="bluesky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#030810"/>
            <stop offset="50%" stop-color="#0c1929"/>

          </linearGradient>
        </defs>
        <rect width="1920" height="1080" fill="url(#bluesky)"/>
        <!-- Moon -->
        <circle cx="1500" cy="180" r="40" fill="#c4d4e8" opacity="0.15"/>
        <circle cx="1510" cy="175" r="38" fill="#030810"/>

// ─── Kit Character SVG ──────────────────────────────────────────
function kitSVG(accent) {
  return `<svg viewBox="0 0 60 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Kit silhouette — flat polygon style like Another World -->
    <!-- Head -->
    <ellipse cx="30" cy="22" rx="12" ry="14" fill="#0a0a0a"/>

    <path d="M18 18 Q22 8 30 10 Q38 8 42 18" fill="#0a0a0a"/>
    <!-- Body -->
    <polygon points="22,36 38,36 42,80 18,80" fill="#0a0a0a"/>
    <!-- Apron suggestion -->
    <polygon points="24,50 36,50 38,78 20,78" fill="${accent}" opacity="0.15"/>
    <!-- Arms -->
    <polygon points="18,40 12,65 16,66 22,42" fill="#0a0a0a"/>
    <polygon points="42,40 48,62 44,63 38,42" fill="#0a0a0a"/>
    <!-- Legs -->
    <polygon points="22,80 18,115 24,115 28,80" fill="#0a0a0a"/>
    <polygon points="32,80 36,115 42,115 38,80" fill="#0a0a0a"/>
    <!-- Feet -->
    <ellipse cx="21" cy="117" rx="6" ry="3" fill="#0a0a0a"/>
    <ellipse cx="39" cy="117" rx="6" ry="3" fill="#0a0a0a"/>
    <!-- Subtle edge highlight -->
    <path d="M22,36 Q30,34 38,36" stroke="${accent}" stroke-width="0.5" stroke-opacity="0.3" fill="none"/>
  </svg>`;
}

// ─── Particle Generator ─────────────────────────────────────────
function createParticles(container, config) {
  const { color, count, style } = config;
  const particleContainer = document.createElement('div');
  particleContainer.className = 'particles';

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = style === 'embers' ? Math.random() * 4 + 2 : Math.random() * 3 + 1;
    const left = Math.random() * 100;
    const bottom = Math.random() * 40 + 20;
    const duration = Math.random() * 6 + 4;
    const delay = Math.random() * 4;

    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${left}%;
      bottom: ${bottom}%;
      background: ${color};
      opacity: 0;
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
      ${style === 'embers' ? `box-shadow: 0 0 ${size * 2}px ${color}66;` : ''}
      ${style === 'firefly' ? `box-shadow: 0 0 ${size * 3}px ${color}44; border-radius: 50%;` : ''}
    `;
    particleContainer.appendChild(p);
  }

  container.appendChild(particleContainer);
}

// ─── Light Shaft Generator ──────────────────────────────────────
function createLightShaft(container, color) {
  const shaft = document.createElement('div');
  shaft.className = 'light-shaft';
  shaft.style.cssText = `
    left: ${30 + Math.random() * 40}%;
    background: linear-gradient(180deg, transparent 0%, ${color}08 30%, ${color}12 50%, ${color}08 70%, transparent 100%);
    animation-delay: ${Math.random() * 3}s;
  `;
  container.appendChild(shaft);
}

// ─── Scene Builder ──────────────────────────────────────────────
let currentTransition = 0;
let scenePhase = 0; // 0 = initial, 1 = panning, 2 = arrived

function playTransition(index) {
  currentTransition = index;
  scenePhase = 0;

  // Update button states
  document.querySelectorAll('.controls button').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  const transition = TRANSITIONS[index];
  const scene = document.getElementById('scene');
  const fade = document.getElementById('fade');
  const dialogue = document.getElementById('dialogue');
  const dialogueText = document.getElementById('dialogue-text');
  const stationLabel = document.getElementById('station-label');
  const stationName = document.getElementById('station-name');
  const continueEl = document.getElementById('continue');

  // Phase 1: Fade to black
  fade.classList.add('active');
  dialogue.classList.remove('visible');
  stationLabel.classList.remove('visible');
  continueEl.classList.remove('visible');

  setTimeout(() => {
    // Clear scene
    scene.innerHTML = '';
    scene.className = 'scene';

    // Build SVG layers
    const svgs = buildSceneSVGs(transition);

    const layers = ['sky', 'far', 'mid', 'near', 'ground'];
    layers.forEach(layerName => {
      if (svgs[layerName]) {
        const div = document.createElement('div');
        div.className = `layer ${layerName}`;
        div.innerHTML = svgs[layerName];
        scene.appendChild(div);
      }
    });

    // Add Kit character
    const kitLayer = document.createElement('div');
    kitLayer.className = 'layer characters';
    const kitEl = document.createElement('div');
    kitEl.className = 'kit-silhouette walking';
    kitEl.innerHTML = kitSVG(transition.to.color);
    kitLayer.appendChild(kitEl);
    scene.appendChild(kitLayer);

    // Add particles
    if (svgs.particles) {
      createParticles(scene, svgs.particles);
    }

    // Add light shaft
    createLightShaft(scene, transition.to.color);

    // Set dialogue
    dialogueText.textContent = transition.kitLine;
    stationName.textContent = transition.to.name;
    stationName.style.color = transition.to.color;

    // Phase 2: Fade from black (scene revealed)
    setTimeout(() => {
      fade.classList.remove('active');
      scenePhase = 1;

      // Phase 3: Start parallax pan after a beat
      setTimeout(() => {
        scene.classList.add('pan-right');

        // Show dialogue during pan
        setTimeout(() => {
          dialogue.classList.add('visible');
        }, 1000);

        // Show station label
        setTimeout(() => {
          stationLabel.classList.add('visible');
        }, 500);

        // Stop walk animation when pan finishes
        setTimeout(() => {
          const kit = scene.querySelector('.kit-silhouette');
          if (kit) kit.classList.remove('walking');
          scenePhase = 2;

          // Show continue prompt
          continueEl.classList.add('visible');
        }, 5500);

      }, 800);
    }, 400);

  }, 1200);
}

function advanceScene() {
  if (currentTransition < TRANSITIONS.length - 1) {
    playTransition(currentTransition + 1);
  }
}

// Auto-play first transition on load
window.addEventListener('load', () => {
  setTimeout(() => playTransition(0), 500);
});
