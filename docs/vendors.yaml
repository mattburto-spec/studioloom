# Vendor / DPA registry — canonical list of third-party services StudioLoom sends data to.
# Update convention: any new vendor added to the codebase MUST get an entry here before the code
# that integrates it is marked production-ready. Verified quarterly.
#
# owner is always Matt for now (solo-dev era). Review_date is the next quarterly check.

version: 1

owner: matt
last_reviewed: 2026-04-14
next_review: 2026-07-14

vendors:

  anthropic:
    name: Anthropic
    role: LLM provider — Claude Sonnet 4 (generation), Haiku 4.5 (mentoring, moderation)
    status: integrated
    region: us
    data_sent:
      - category: teacher_content
        fields: [units.content_data, lessons.content, knowledge_uploads.content]
        basis: legitimate_interest
      - category: student_voice_text
        fields: [design_conversation_turns.content, student_responses.response_text]
        basis: coppa_art_6
      - category: student_self_disclosure_profile
        # Added 2026-05-09 (security audit P-5). UDL accommodations + learning
        # differences (anxiety, autism, ADHD, dyslexia self-reports), languages,
        # countries lived in, design confidence, working style, communication
        # preferences. Embedded into design-assistant + Open Studio mentor prompts.
        fields:
          - students.learning_profile  # see src/lib/design-assistant/conversation.ts:707-848
          - open_studio_profiles.discovery_conversation
          - open_studio_profiles.plan_health_score
        basis: coppa_art_6
      - category: student_aspirations_narrative
        # Added 2026-05-09. Quest journey strengths/interests/project narrative,
        # Discovery Engine station outputs (irritation free-text, archetype,
        # fear cards, resources, self-efficacy, past project outcomes).
        fields:
          - quest_journeys.discovery_profile  # build-quest-prompt.ts:112-122
          - quest_journeys.contract  # what + who_for fields
          - discovery_station_outputs.*  # all station-level outputs
        basis: coppa_art_6
      - category: safety_sensitive_text
        fields: [moderation_reports.content, design_conversation_turns.content]
        basis: coppa_art_6
      - category: student_uploaded_image_for_moderation
        # Added 2026-05-09. Student-uploaded images go to Claude Vision
        # specifically to be moderated. Source label only — no name in prompt.
        # See src/lib/content-safety/server-moderation.ts:199.
        fields: [content_items.image_blob_for_moderation]
        basis: coppa_art_6
      - category: teacher_uploaded_document_imagery
        # Added 2026-05-09. Teacher-uploaded PDFs, DOCX/PPTX extracted images,
        # and timetable PDFs/images. Note: timetable images can contain teacher
        # AND student names — server-side OCR redaction tracked as P-4 in
        # security-plan.md. Until P-4 ships, UI warning at upload + this
        # disclosure are the controls.
        fields:
          - knowledge_uploads.images
          - timetable_uploads.image_blob  # parse-upload route
        basis: legitimate_interest
      - category: system_metadata
        fields: [unit_type, framework, class_id]
        basis: pseudonymous
    dpa_signed: null
    subprocessors: [aws]
    student_data_eligible: true
    certifications: [soc2_type2]
    contract_type: standard
    notes: |
      DPA pending — Anthropic offers Zero Data Retention addendum; needs signing.

      PII redaction posture (verified by security audit 2026-05-09):
      - Student NAMES never reach Anthropic. The Report Writer free tool
        (tools/report-writer + tools/report-writer/bulk) is the only path that
        accepts a teacher-provided student name. Name is substituted with a
        "Student" placeholder before send and restored on response client-side
        via restoreStudentName() in src/lib/tools/report-writer-prompt.ts.
      - Student EMAIL / FULL NAME / DOB / classcode never appear in any
        prompt body across 43 audited callsites.
      - All Anthropic egress flows through src/lib/ai/call.ts ->
        callAnthropicMessages() (single chokepoint).

      Self-disclosed profile data (learning_profile, quest discovery profile,
      discovery station outputs) DOES flow under coppa_art_6 with parental
      consent — these are categories above, not redacted.

      Open follow-ups: P-3 in security-plan.md (decoupling Anthropic ZDR
      addendum), P-4 (timetable OCR pre-pass redaction).

  supabase:
    name: Supabase
    role: Database + auth + storage
    status: integrated
    region: us
    data_sent:
      - category: pii_identifiers
        fields: [auth.users.email, students.display_name, teacher_profiles.full_name]
        basis: coppa_art_6
      - category: student_voice_text
        fields: [design_conversation_turns.content, student_responses.response_text]
        basis: coppa_art_6
      - category: student_voice_images
        fields: [portfolio_snapshots.image_url, gallery_submissions.image_url]
        basis: coppa_art_6
      - category: teacher_content
        fields: [units.content_data, lessons.content, knowledge_uploads.content]
        basis: contract
      - category: auth_sessions
        fields: [auth.sessions, auth.refresh_tokens]
        basis: contract
      - category: telemetry_metadata
        # Added 2026-05-09 (Gemini external review). The ai_usage_log
        # table stores per-call attribution (endpoint, model, tokens,
        # studentId). The free-tool routes (Report Writer + Marking
        # Comments) write teacher email + occasionally student first
        # name into ai_usage_log.metadata for breakdown views. Doesn't
        # leave the platform (Supabase IS the data store) but worth
        # cataloguing as PII-bearing telemetry.
        fields:
          - ai_usage_log.endpoint
          - ai_usage_log.model
          - ai_usage_log.metadata  # may include teacher email + student first name
          - audit_events.actor_id
          - audit_events.target_id
        basis: legitimate_interest
    dpa_signed: null
    subprocessors: [aws, cloudflare]
    student_data_eligible: true
    certifications: [soc2_type2, iso27001]
    contract_type: standard
    notes: "DPA pending — Supabase offers standard DPA at supabase.com/legal/dpa"

  voyage:
    name: Voyage AI
    role: Embeddings — voyage-3.5 (1024-dim vectors) for RAG retrieval and semantic search
    status: integrated
    region: us
    data_sent:
      - category: teacher_content
        fields: [knowledge_uploads.content, activity_blocks.instruction_text]
        basis: legitimate_interest
    dpa_signed: null
    subprocessors: []
    student_data_eligible: false
    certifications: []
    contract_type: standard
    notes: "DPA pending — no student text sent today; only teacher-uploaded knowledge base content"

  vercel:
    name: Vercel
    role: Hosting + edge compute + build + logs + Web Analytics + Speed Insights
    status: integrated
    region: multi
    data_sent:
      - category: system_metadata
        fields: [request paths, response status codes, deployment metadata]
        basis: pseudonymous
      - category: error_reports
        fields: [stack traces, request context]
        basis: legitimate_interest
      # Added 8 May 2026 (PR #110) — Vercel Web Analytics + Speed Insights
      # turned on with the Pro plan. No cookies, no PII, GDPR/COPPA-safe per
      # Vercel docs. Plausible removed in PR #111 (was the predecessor).
      - category: analytics_pageviews
        fields: [path, referrer, country/region, device type, browser]
        basis: legitimate_interest
      - category: analytics_web_vitals
        fields: [LCP, FID, CLS, TTFB, INP per route]
        basis: legitimate_interest
    dpa_signed: null
    subprocessors: [aws, cloudflare]
    student_data_eligible: false
    certifications: [soc2_type2]
    contract_type: standard
    notes: "DPA pending — Vercel offers DPA at vercel.com/legal/dpa; no payloads stored, only infra logs. Web Analytics + Speed Insights are first-party, no cookies."

  groq:
    name: Groq
    role: Fallback LLM — intended primary fallback for Anthropic
    status: not_integrated
    region: us
    data_sent: []
    dpa_signed: null
    subprocessors: []
    student_data_eligible: false
    certifications: []
    contract_type: free_tier
    notes: "FU-Y — integration never shipped; credential resolution code exists but no call sites"

  gemini:
    name: Google Gemini
    role: Fallback LLM — intended secondary fallback after Groq
    status: not_integrated
    region: us
    data_sent: []
    dpa_signed: null
    subprocessors: [gcp]
    student_data_eligible: false
    certifications: []
    contract_type: free_tier
    notes: "FU-Y — integration never shipped; credential resolution code exists but no call sites"

  resend:
    name: Resend
    role: Transactional email — cost alert notifications to admin
    status: integrated
    region: us
    data_sent:
      - category: email_content
        fields: [cost alert subject, cost alert body]
        basis: contract
      - category: pii_identifiers
        fields: [teacher email address as recipient]
        basis: contract
    dpa_signed: null
    subprocessors: [aws]
    student_data_eligible: false
    certifications: []
    contract_type: standard
    notes: "DPA pending — teacher-only comms; FU-M notes live test not yet performed"

  sentry:
    name: Sentry
    role: Error tracking + performance monitoring
    status: integrated
    region: us
    data_sent:
      - category: error_reports
        fields: [stack traces, error messages, breadcrumbs]
        basis: legitimate_interest
      - category: system_metadata
        fields: [request URLs, browser metadata, performance traces]
        basis: pseudonymous
    dpa_signed: null
    subprocessors: [gcp, cloudflare]
    student_data_eligible: false
    certifications: [soc2_type2]
    contract_type: standard
    notes: "DPA pending — PII scrubbing should be enabled in dashboard; verify quarterly"

  elevenlabs:
    name: ElevenLabs
    role: Text-to-speech — reads lesson content aloud for student accessibility
    status: integrated
    region: us
    data_sent:
      - category: teacher_content
        fields: [lesson prompts, learning goals, introduction text]
        basis: legitimate_interest
    dpa_signed: null
    subprocessors: []
    student_data_eligible: false
    certifications: []
    contract_type: standard
    notes: "TTS route sends teacher-authored content only; no student-authored text reaches ElevenLabs"
