- name: activity_cards
  source_migration: 015_activity_cards.sql
  status: applied
  applied_date: null
  purpose: null
  columns:
    id: UUID PRIMARY KEY DEFAULT gen_random_uuid()
    slug: TEXT UNIQUE NOT NULL
    name: TEXT NOT NULL
    description: TEXT NOT NULL
    category: TEXT NOT NULL CHECK (category IN ( 'design-thinking', 'visible-thinking', 'evaluation', 'brainstorming', 'analysis',
      'skills' ))
    criteria: TEXT[] DEFAULT '{}'
    phases: TEXT[] DEFAULT '{}'
    thinking_type: TEXT CHECK (thinking_type IN ( 'creative', 'critical', 'analytical', 'metacognitive' ))
    duration_minutes: INT
    group_size: TEXT CHECK (group_size IN ( 'individual', 'pairs', 'small-group', 'whole-class', 'flexible' ))
    materials: TEXT[] DEFAULT '{}'
    tools: TEXT[] DEFAULT '{}'
    resources_needed: TEXT
    teacher_notes: TEXT
    template: JSONB NOT NULL DEFAULT '{}'
    ai_hints: JSONB NOT NULL DEFAULT '{}'
    curriculum_frameworks: TEXT[] DEFAULT '{IB_MYP}'
    source: TEXT NOT NULL DEFAULT 'system' CHECK (source IN ( 'system', 'teacher', 'community', 'ai_generated' ))
    created_by: UUID REFERENCES auth.users(id) ON DELETE SET NULL
    parent_card_id: UUID REFERENCES activity_cards(id) ON DELETE SET NULL
    times_used: INT DEFAULT 0
    avg_edit_distance: FLOAT
    embedding: vector(1024)
    fts: tsvector GENERATED ALWAYS AS ( to_tsvector('english', name || ' ' || description) ) STORED
    is_public: BOOLEAN DEFAULT true
    created_at: TIMESTAMPTZ DEFAULT now()
    updated_at: TIMESTAMPTZ DEFAULT now()
  indexes:
  - activity_cards_embedding_idx ON USING hnsw (embedding vector_cosine_ops)
  - activity_cards_fts_idx ON USING gin (fts)
  - activity_cards_category_idx ON (category)
  - activity_cards_criteria_idx ON USING gin (criteria)
  - activity_cards_source_idx ON (source)
  - activity_cards_thinking_type_idx ON (thinking_type)
  - activity_cards_curriculum_idx ON USING gin (curriculum_frameworks)
  - activity_cards_slug_idx ON (slug)
  rls:
    read: Anyone can read public activity cards (unknown); Teachers read own cards (unknown); Teachers manage own cards (unknown);
      Service role full access activity cards (unknown)
    write: Teachers manage own cards (unknown); Service role full access activity cards (unknown)
