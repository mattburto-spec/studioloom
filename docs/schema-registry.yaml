    tier: text CHECK (tier IN ('bronze','silver','gold'))
    domain_id: text REFERENCES skill_domains(id) ON DELETE RESTRICT
    age_min: int
    age_max: int
    framework_anchors: jsonb NOT NULL DEFAULT '[]'::jsonb
    demo_of_competency: text
    learning_outcomes: jsonb NOT NULL DEFAULT '[]'::jsonb
    applied_in: jsonb NOT NULL DEFAULT '[]'::jsonb
    card_type: text NOT NULL DEFAULT 'lesson' CHECK (card_type IN ('lesson','routine'))
    author_name: text
    quiz_questions: JSONB NOT NULL DEFAULT '[]'::jsonb
    pass_threshold: INTEGER NOT NULL DEFAULT 80 CHECK (pass_threshold BETWEEN 0 AND 100)
    retake_cooldown_minutes: INTEGER NOT NULL DEFAULT 0 CHECK (retake_cooldown_minutes >= 0)
    question_count: INTEGER CHECK (question_count IS NULL OR question_count > 0)
