# ============================================================
# Schema Registry — Source of Truth for Database Schema State
# ============================================================
#
# Purpose: Per-table record of what actually exists in the StudioLoom
# database, how it got there, who writes to it, who reads from it, and
# any drift between the spec and reality. Prevents re-doing the same
# audit every time a new phase touches a table.
#
# Scope: Tables and columns that have been touched by any phase of work,
# or are planned for an upcoming phase. This is NOT a full mirror of the
# Supabase schema — it's a curated record of decisions and drift.
#
# Relationship to other docs:
# - WIRING.yaml tracks SYSTEMS (82 of them, e.g. "content-safety").
# - schema-registry.yaml tracks TABLES (the DB shape under those systems).
# - resolved-issues-archive.md has the historical prose log of applied
#   migrations — this YAML supersedes it for tables going forward.
#
# How to use:
# - Before any migration, check whether the target table already has an
#   entry here. If yes, read the drift field before assuming the spec is
#   the ground truth.
# - After a migration is applied, update applied=true + applied_date.
# - When a spec conflict is resolved, append to the drift field with a
#   dated decision entry.
# - Sync this file in saveme step 11.
#
# Status key:
# - planned      — migration written but not applied to prod
# - applied      — migration confirmed applied in prod via probe query
# - deprecated   — table exists but is being phased out
# - historical   — in prod but not actively written (archive data)
#
# ============================================================

last_updated: 2026-04-20
