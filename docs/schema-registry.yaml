tables:
- name: activity_block_versions
  source_migration: 080_block_versioning.sql
  status: pending
  applied_date: null
  purpose: Auto-versioned snapshots of activity_blocks before each UPDATE. Preserves edit history.
  columns:
    id: UUID PRIMARY KEY DEFAULT gen_random_uuid()
    block_id: UUID NOT NULL REFERENCES activity_blocks(id) ON DELETE CASCADE
    version_number: INT NOT NULL
    title: TEXT
    prompt: TEXT
    description: TEXT
    efficacy_score: FLOAT
    bloom_level: TEXT
    time_weight: TEXT
    phase: TEXT
    grouping: TEXT
    activity_category: TEXT
    tags: TEXT[]
    materials_needed: TEXT[]
    moderation_status: TEXT
    ai_rules: JSONB
    scaffolding: JSONB
    edited_by: UUID
    edit_reason: TEXT
    created_at: TIMESTAMPTZ DEFAULT now()
  unique_constraints:
  - - block_id
    - version_number
  indexes:
  - idx_block_versions_block ON (block_id, version_number DESC)
  rls:
    read: Teachers read own block versions (unknown); Service role full access block versions (unknown)
    write: Service role full access block versions (unknown)
  writers: []
  readers: []
  spec_drift: []
- name: activity_blocks
  source_migration: 060_activity_blocks.sql
  status: applied
  applied_date: '2026-04-01'  # Phase A bootstrap, ~1 Apr 2026; exact date not logged at the time
  purpose: |
    First-class library entries for reusable activity templates. Replaces inline JSONB
    activity definitions. Extracted from teacher uploads (knowledge pipeline) and
    generated units (generation pipeline). Drives BlockPalette in the lesson editor
    and feeds the Lesson Pulse repair / generation co-pilot. Composite ranking on
    relevance + efficacy + context-match + teacher affinity + freshness (per WIRING
    activity-blocks summary — note: ranking weights claimed there have not been
    verified against code; see FU-LEVER-1-RANKING-WEIGHTS-AUDIT).
  spec_drift:
  - date: '2026-05-04'
    note: |
      Lever 1 sub-phase 1B added 4 columns: framing TEXT (nullable),
      task TEXT (nullable), success_signal TEXT (nullable),
      backfill_needs_review BOOLEAN NOT NULL DEFAULT false. Migration:
      20260504020826_activity_three_field_prompt.sql. Brief:
      docs/projects/lesson-quality-lever-1-slot-fields.md. Renderer
      composes via hybrid spec — see brief §Renderer composition.
      Legacy `prompt` column kept (transition window, removal gated
      30 days post-Lever-1).
  - date: '2026-05-04'
    note: |
      Drift fix: applied_date and purpose were null pre-Lever-1 — populated
      from CLAUDE.md Phase A context (~1 Apr 2026 + bootstrap blurb).
      RLS read/write policy detail still '(unknown)' below — scanner
      doesn't introspect the policies; flagged FU-SCHEMA-REGISTRY-RLS-DETAIL.
  - date: '2026-05-04'
    note: |
      Lever 1 sub-phase 1H closed audit step 7: every reader of
      `block.prompt` / `section.prompt` (lesson-tiles, edit-tracker,
      knowledge/chunk, timing-validation, infer-bloom, activity-library,
      design-assistant, plus 9 wizard / display components) now reads via
      `composedPromptText()` so v2 slot fields take priority during the
      transition. Also closed a 1G validator regression: validateGeneratedPages
      and validateTimelineActivities still required legacy `prompt` —
      both now accept slots OR legacy and compose `prompt` from slots
      for back-compat consumers. Tests +24 (3600 → 3624). Helpers
      composedPromptText / hasSlotFields widened from ActivitySection
      to a structural SlotBearing shape so they work over TimelineActivity,
      ActivityBlock rows, AI tool payloads, and fixtures.
  columns:
    id: UUID PRIMARY KEY DEFAULT gen_random_uuid()
    teacher_id: UUID REFERENCES auth.users(id)
    title: TEXT NOT NULL
    description: TEXT
    prompt: TEXT NOT NULL  # Legacy single-field. Renderer falls back to this when framing/task/success_signal all null. Removal: 30-day post-Lever-1 soak gated.
    framing: TEXT  # Lever 1 slot — one-sentence orient (≤200 chars).
    task: TEXT  # Lever 1 slot — imperative body (≤800 chars).
    success_signal: TEXT  # Lever 1 slot — what students produce (≤200 chars).
    backfill_needs_review: BOOLEAN NOT NULL DEFAULT false  # Lever 1 sub-phase 1C heuristic-split flag.
    source_type: TEXT NOT NULL
    source_upload_id: UUID
    source_unit_id: UUID
    source_page_id: TEXT
    source_activity_index: INT
    bloom_level: TEXT
    time_weight: TEXT DEFAULT 'moderate'
    grouping: TEXT DEFAULT 'individual'
    phase: TEXT
    activity_category: TEXT
    ai_rules: JSONB
    udl_checkpoints: TEXT[]
    success_look_fors: TEXT[]
    output_type: TEXT
    prerequisite_tags: TEXT[]
    lesson_structure_role: TEXT
    response_type: TEXT
    toolkit_tool_id: TEXT
    materials_needed: TEXT[]
    tech_requirements: TEXT[]
    scaffolding: JSONB
    example_response: TEXT
    efficacy_score: FLOAT DEFAULT 50
    times_used: INT DEFAULT 0
    times_skipped: INT DEFAULT 0
    times_edited: INT DEFAULT 0
    avg_time_spent: FLOAT
    avg_completion_rate: FLOAT
    source_format_hint: TEXT
    embedding: halfvec(1024)
    fts: tsvector
    tags: TEXT[]
    is_assessable: BOOLEAN DEFAULT false
    assessment_config: JSONB
    interactive_config: JSONB
    supports_visual_assessment: BOOLEAN DEFAULT false
    pii_scanned: BOOLEAN DEFAULT false
    pii_flags: JSONB
    copyright_flag: TEXT DEFAULT 'own'
    teacher_verified: BOOLEAN DEFAULT false
    module: TEXT DEFAULT 'studioloom'
    media_asset_ids: UUID[]
    is_public: BOOLEAN DEFAULT false
    is_archived: BOOLEAN DEFAULT false
    created_at: TIMESTAMPTZ DEFAULT now()
    updated_at: TIMESTAMPTZ DEFAULT now()
    moderation_status: TEXT
    content_fingerprint: TEXT
    last_used_at: TIMESTAMPTZ
    archived_at: TIMESTAMPTZ
    embedding_generated_at: TIMESTAMPTZ
    decay_applied_total: INT DEFAULT 0
  unique_constraints:
  - - content_fingerprint
  indexes:
  - idx_blocks_teacher ON (teacher_id)
  - idx_blocks_bloom ON (bloom_level)
  - idx_blocks_phase ON (phase)
  - idx_blocks_category ON (activity_category)
  - idx_blocks_time ON (time_weight)
  - idx_blocks_efficacy ON (efficacy_score)
  - idx_blocks_source ON (source_type)
  - idx_blocks_module ON (module)
  - idx_blocks_embedding ON USING ivfflat (embedding halfvec_cosine_ops)
  - idx_blocks_fts ON USING gin (fts)
  - idx_activity_blocks_moderation_status ON (moderation_status)
  - idx_activity_blocks_content_fingerprint ON (content_fingerprint)
  rls:
    read: activity_blocks_select (unknown); activity_blocks_select (unknown)
    write: activity_blocks_insert (unknown); activity_blocks_update (unknown); activity_blocks_delete (unknown)
  writers:
  - src/app/api/admin/feedback/route.ts
  - src/app/api/admin/ingestion-sandbox/commit/route.ts
