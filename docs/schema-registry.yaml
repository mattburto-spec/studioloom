- name: skill_cards
  source_migration: 105_skills_library_schema.sql
  status: applied
  applied_date: null
  purpose: 'Skills Library canonical content entity. The moat — authored once, referenced from library / lesson activity blocks
    / Open Studio capability-gaps / class gallery / safety badges. Migration 110 upgraded the schema to host the v1 catalogue
    of 60 cards: renamed difficulty → tier (Bronze/Silver/Gold DofE vocabulary), added domain FK + age bands + framework anchors
    + demo_of_competency + learning_outcomes + applied_in + card_type + author_name.'
  columns:
    id: uuid PRIMARY KEY DEFAULT gen_random_uuid()
    slug: text UNIQUE NOT NULL
    title: text NOT NULL
