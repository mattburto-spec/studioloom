<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioLoom Wiring Diagram</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a25;
            --border: #2a2a3a;
            --text: #e0e0e8;
            --text-muted: #9a9aa8;
            --accent: #7c5cfc;
            --accent-light: #9d7dff;

            --status-complete: #10b981;
            --status-active: #3b82f6;
            --status-planned: #f59e0b;
            --status-idea: #8b5cf6;
            --status-future: #6b7280;
            --status-quarantined: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            padding: 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .controls {
            padding: 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.95rem;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .filter-pill {
            padding: 0.5rem 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .filter-pill:hover {
            border-color: var(--accent);
        }

        .filter-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 0;
            height: calc(100vh - 500px);
            min-height: 500px;
        }

        .systems-panel {
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .systems-list {
            flex: 1;
            overflow-y: auto;
        }

        .category-group {
            border-bottom: 1px solid var(--border);
        }

        .category-header {
            padding: 0.75rem 1rem;
            background: var(--surface2);
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: sticky;
            top: 0;
            border-bottom: 1px solid var(--border);
        }

        .system-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .system-item:hover {
            background: var(--surface2);
        }

        .system-item.active {
            background: rgba(124, 92, 252, 0.1);
            border-left: 3px solid var(--accent);
            padding-left: calc(1rem - 3px);
        }

        .system-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .system-meta {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .dep-count {
            background: var(--surface2);
            padding: 0.125rem 0.375rem;
            border-radius: 3px;
            font-size: 0.75rem;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .status-complete { background: rgba(16, 185, 129, 0.15); color: var(--status-complete); }
        .status-active { background: rgba(59, 130, 246, 0.15); color: var(--status-active); }
        .status-planned { background: rgba(245, 158, 11, 0.15); color: var(--status-planned); }
        .status-idea { background: rgba(139, 92, 246, 0.15); color: var(--status-idea); }
        .status-future { background: rgba(107, 114, 128, 0.15); color: var(--status-future); }
        .status-quarantined { background: rgba(239, 68, 68, 0.15); color: var(--status-quarantined); }

        .details-panel {
            background: var(--surface2);
            overflow-y: auto;
            padding: 2rem;
        }

        .no-selection {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 2rem;
        }

        .detail-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .detail-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .detail-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.875rem;
        }

        .detail-meta-item {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section-title {
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .detail-summary {
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 1.5rem;
        }

        .system-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .system-link:hover {
            text-decoration: underline;
        }

        .link-list {
            list-style: none;
            padding: 0;
        }

        .link-list li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .link-list li:last-child {
            border-bottom: none;
        }

        .mini-graph {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin: 1rem 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            overflow-x: auto;
        }

        .graph-content {
            display: flex;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            min-width: 100%;
        }

        .graph-column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .graph-node {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            max-width: 120px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .graph-node.center {
            background: rgba(124, 92, 252, 0.1);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .data-table th,
        .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--surface);
            font-weight: 600;
            color: var(--accent);
        }

        .data-table tr:hover {
            background: var(--surface);
        }

        .impact-text {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid var(--status-planned);
            padding: 1rem;
            border-radius: 4px;
            color: var(--text);
            margin: 1rem 0;
        }

        .future-text {
            background: rgba(139, 92, 246, 0.1);
            border-left: 3px solid var(--status-idea);
            padding: 1rem;
            border-radius: 4px;
            color: var(--text);
            margin: 1rem 0;
        }

        .dep-chains {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .dep-chains summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--accent);
            font-size: 0.95rem;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dep-chains summary:hover {
            color: var(--accent-light);
        }

        .dep-chains ul {
            list-style: none;
            padding: 0;
            margin-top: 1rem;
        }

        .dep-chains li {
            padding: 0.5rem 0 0.5rem 1.5rem;
            position: relative;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .dep-chains li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .systems-panel {
                max-height: 300px;
            }

            header h1 {
                font-size: 1.75rem;
            }

            .stat-value {
                font-size: 1.25rem;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .detail-header {
                font-size: 0.9rem;
            }

            .graph-content {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

        <p>Interactive system dependency explorer</p>

        <div class="stat">

        <div class="stat">

        <div class="filter-group">

        </div>

        <div class="details-panel">
            <div id="details-content" class="no-selection">
                Select a system to see details
            </div>
        </div>
    </div>

        ];

        // Compute affects (reverse dependencies)
        SYSTEMS.forEach(system => {
            system.affects = [];
        });

        SYSTEMS.forEach(system => {
            system.deps.forEach(depId => {
                const depSystem = SYSTEMS.find(s => s.id === depId);
                if (depSystem && !depSystem.affects.includes(system.id)) {
                    depSystem.affects.push(system.id);
                }
            });
        });

        // DEP CHAINS
        const DEP_CHAINS = [
            "Discovery Engine → Student Profile → Intelligence Profiles → AI Mentor",
            "Unit Generation Wizard → Generation Pipeline → Activity Block Library → Knowledge Library",
            "Teaching Mode → Lesson View → Activity Blocks → Framework Adapter",
            "Lesson Editor → Content Forking → Unit Adapter → Activity Blocks",
            "Open Studio (Teacher) → Open Studio (Student) → Journey Engine → 3D Scenes",
            "NM System → Student NM View → Competency Scoring → Teacher Grading",
            "Timetable → Cycle Engine → Scheduling → Timing Engine"
        ];

        // State
        let selectedSystem = null;
        let searchTerm = '';
        let categoryFilter = new Set();
        let statusFilter = new Set();

        // Get unique categories and statuses
        const categories = [...new Set(SYSTEMS.map(s => s.cat))].sort();
        const statuses = ['complete', 'active', 'planned', 'idea', 'future', 'quarantined'];

        // Initialize filters
        function initializeFilters() {
            const categoryContainer = document.getElementById('category-filters');
            categories.forEach(cat => {
                const pill = document.createElement('button');
                pill.className = 'filter-pill';
                pill.textContent = cat.split(' ').pop();
                pill.title = cat;
                pill.onclick = () => {
                    if (categoryFilter.has(cat)) {
                        categoryFilter.delete(cat);
                        pill.classList.remove('active');
                    } else {
                        categoryFilter.add(cat);
                        pill.classList.add('active');
                    }
                    renderList();
                };
                categoryContainer.appendChild(pill);
            });

            const statusContainer = document.getElementById('status-filters');
            statuses.forEach(status => {
                const pill = document.createElement('button');
                pill.className = 'filter-pill';
                pill.textContent = status;
                pill.onclick = () => {
                    if (statusFilter.has(status)) {
                        statusFilter.delete(status);
                        pill.classList.remove('active');
                    } else {
                        statusFilter.add(status);
                        pill.classList.add('active');
                    }
                    renderList();
                };
                statusContainer.appendChild(pill);
            });
        }

        // Update stats
        function updateStats() {
            let totalDeps = 0;
            SYSTEMS.forEach(s => totalDeps += s.deps.length);

            document.getElementById('total-deps').textContent = totalDeps;

            statuses.forEach(status => {
                const count = SYSTEMS.filter(s => s.status === status).length;
                document.getElementById(`status-${status}`).textContent = count;
            });
        }

        // Filter systems
        function getFilteredSystems() {
            return SYSTEMS.filter(system => {
                const matchesSearch = system.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                     system.id.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = categoryFilter.size === 0 || categoryFilter.has(system.cat);
                const matchesStatus = statusFilter.size === 0 || statusFilter.has(system.status);

                return matchesSearch && matchesCategory && matchesStatus;
            });
        }

        // Render system list
        function renderList() {
            const filtered = getFilteredSystems();
            const grouped = {};

            filtered.forEach(system => {
                if (!grouped[system.cat]) {
                    grouped[system.cat] = [];
                }
                grouped[system.cat].push(system);
            });

            const list = document.getElementById('systems-list');
            list.innerHTML = '';

            categories.forEach(cat => {
                if (grouped[cat]) {
                    const group = document.createElement('div');
                    group.className = 'category-group';

                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.textContent = cat;
                    group.appendChild(header);

                    grouped[cat].forEach(system => {
                        const item = document.createElement('div');
                        item.className = 'system-item';
                        if (selectedSystem?.id === system.id) {
                            item.classList.add('active');
                        }

                        item.innerHTML = `
                            <div>
                                <div class="system-name">${system.name}</div>
                                <div class="system-meta">
                                    <span class="status-badge status-${system.status}">${system.status}</span>
                                    <span class="dep-count">${system.deps.length} deps</span>
                                </div>
                            </div>
                        `;

                        item.onclick = () => selectSystem(system);
                        group.appendChild(item);
                    });

                    list.appendChild(group);
                }
            });
        }

        // Select system
        function selectSystem(system) {
            selectedSystem = system;
            renderDetails();
            renderList();
        }

        // Render details
        function renderDetails() {
            const container = document.getElementById('details-content');

            if (!selectedSystem) {
                container.innerHTML = '<div class="no-selection">Select a system to see details</div>';
                return;
            }

            const affectedSystems = selectedSystem.affects.map(id => SYSTEMS.find(s => s.id === id)).filter(Boolean);

            let html = `
                <div class="detail-header">
                    <div class="detail-title">${selectedSystem.name}</div>
                    <div class="detail-meta">
                        <div class="detail-meta-item">
                            <strong>Status:</strong>
                            <span class="status-badge status-${selectedSystem.status}">${selectedSystem.status}</span>
                        </div>
                        <div class="detail-meta-item">
                            <strong>Category:</strong> ${selectedSystem.cat}
                        </div>
                        <div class="detail-meta-item">
                            <strong>Version:</strong> ${selectedSystem.v}
                        </div>
                        <div class="detail-meta-item">
                            <strong>OS Seam:</strong> <span style="color: var(--accent)">${selectedSystem.os}</span>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-summary">${selectedSystem.summary}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">Dependency Graph</div>
                    <div class="mini-graph">
                        <div class="graph-content">
                            ${selectedSystem.deps.length > 0 ? `
                                <div class="graph-column">
                                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;">Depends On</div>
                                    ${selectedSystem.deps.slice(0, 3).map(depId => {
                                        const dep = SYSTEMS.find(s => s.id === depId);
                                        return `<div class="graph-node" onclick="selectSystemById('${depId}')">${dep?.name.substring(0, 15)}...</div>`;
                                    }).join('')}
                                    ${selectedSystem.deps.length > 3 ? `<div class="graph-node" style="opacity: 0.5;">+${selectedSystem.deps.length - 3} more</div>` : ''}
                                </div>
                                <div class="arrow">→</div>
                            ` : ''}
                            <div class="graph-column">
                                <div class="graph-node center">${selectedSystem.name.substring(0, 18)}...</div>
                            </div>
                            ${affectedSystems.length > 0 ? `
                                <div class="arrow">→</div>
                                <div class="graph-column">
                                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;">Affects</div>
                                    ${affectedSystems.slice(0, 3).map(sys => `<div class="graph-node" onclick="selectSystemById('${sys.id}')">${sys.name.substring(0, 15)}...</div>`).join('')}
                                    ${affectedSystems.length > 3 ? `<div class="graph-node" style="opacity: 0.5;">+${affectedSystems.length - 3} more</div>` : ''}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;

            if (selectedSystem.deps.length > 0) {
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Depends On (${selectedSystem.deps.length})</div>
                        <ul class="link-list">
                            ${selectedSystem.deps.map(depId => {
                                const dep = SYSTEMS.find(s => s.id === depId);
                                return `<li><span class="system-link" onclick="selectSystemById('${depId}')">${dep?.name}</span></li>`;
                            }).join('')}
                        </ul>
                    </div>
                `;
            }

            if (affectedSystems.length > 0) {
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Affects (${affectedSystems.length})</div>
                        <ul class="link-list">
                            ${affectedSystems.map(sys => `<li><span class="system-link" onclick="selectSystemById('${sys.id}')">${sys.name}</span></li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            if (selectedSystem.impacts) {
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Change Impacts</div>
                        <div class="impact-text">${selectedSystem.impacts}</div>
                    </div>
                `;
            }

            if (selectedSystem.future) {
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Future Roadmap</div>
                        <div class="future-text">${selectedSystem.future}</div>
                    </div>
                `;
            }

            html += `
                <div class="dep-chains">
                    <details>
                        <summary>Critical Dependency Chains</summary>
                        <ul>
                            ${DEP_CHAINS.map(chain => `<li>${chain}</li>`).join('')}
                        </ul>
                    </details>
                </div>
            `;

            container.innerHTML = html;
        }

        // Global function for onclick
        window.selectSystemById = function(id) {
            const sys = SYSTEMS.find(s => s.id === id);
            if (sys) selectSystem(sys);
        };

        // Event listeners
        document.getElementById('search').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderList();
        });

        // Initialize
        initializeFilters();
        updateStats();
        renderList();
    </script>
</body>
</html>
