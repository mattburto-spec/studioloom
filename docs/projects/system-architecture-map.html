<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudioLoom — System Architecture Map</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #888898;
    --accent: #7c5cfc;
    --accent-glow: rgba(124,92,252,0.3);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.15);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.15);
    --pink: #ec4899;
    --pink-dim: rgba(236,72,153,0.15);
    --cyan: #06b6d4;
    --cyan-dim: rgba(6,182,212,0.15);
    --red: #ef4444;
    --purple: #a855f7;
    --purple-dim: rgba(168,85,247,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #12121a 0%, #0a0a0f 100%);
  }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--text-dim); margin-top: 4px; font-size: 14px; }

  .stats-bar {
    display: flex; gap: 24px; padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .stat { text-align: center; min-width: 80px; }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat.complete .num { color: var(--green); }
  .stat.active .num { color: var(--blue); }
  .stat.planned .num { color: var(--amber); }
  .stat.idea .num { color: var(--purple); }
  .stat.future .num { color: var(--text-dim); }

  .controls {
    display: flex; gap: 12px; padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap; align-items: center;
  }
  .search-box {
    flex: 1; min-width: 200px; padding: 8px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
  }
  .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .search-box::placeholder { color: var(--text-dim); }

  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 12px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn.active-green { background: var(--green); border-color: var(--green); color: white; }
  .filter-btn.active-blue { background: var(--blue); border-color: var(--blue); color: white; }
  .filter-btn.active-amber { background: var(--amber); border-color: var(--amber); color: #000; }
  .filter-btn.active-purple { background: var(--purple); border-color: var(--purple); color: white; }

  .view-tabs {
    display: flex; gap: 4px; margin-left: auto;
  }
  .view-tab {
    padding: 5px 14px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; font-family: inherit;
  }
  .view-tab.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  .main { padding: 24px 40px; }

  /* MATURITY VIEW */
  .category-section { margin-bottom: 32px; }
  .category-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; margin-bottom: 12px;
    border-bottom: 2px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .category-header h2 { font-size: 16px; font-weight: 600; }
  .category-header .count {
    font-size: 12px; color: var(--text-dim);
    background: var(--surface2); padding: 2px 8px; border-radius: 10px;
  }
  .category-header .chevron { color: var(--text-dim); transition: transform 0.2s; font-size: 14px; }
  .category-header.collapsed .chevron { transform: rotate(-90deg); }

  .system-grid { display: flex; flex-direction: column; gap: 6px; }

  .system-row {
    display: grid;
    grid-template-columns: 220px repeat(5, 1fr) 100px 80px;
    gap: 4px; align-items: stretch;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    transition: all 0.15s;
    cursor: pointer;
  }
  .system-row:hover { border-color: var(--accent); background: var(--surface2); }
  .system-row.expanded { border-color: var(--accent); background: var(--surface2); border-radius: 8px 8px 0 0; }

  .sys-name {
    display: flex; flex-direction: column; justify-content: center;
    padding-right: 8px;
  }
  .sys-name .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sys-name .sub { font-size: 10px; color: var(--text-dim); }

  .version-cell {
    font-size: 11px; padding: 6px 8px; border-radius: 4px;
    line-height: 1.35; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .version-cell.empty { background: transparent; }
  .version-cell.filled { background: var(--surface2); color: var(--text-dim); }
  .version-cell.current { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .version-cell.next { background: var(--blue-dim); border: 1px dashed rgba(59,130,246,0.3); color: var(--blue); }

  .status-badge {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; border-radius: 4px; padding: 2px 6px;
    height: fit-content; align-self: center;
  }
  .status-badge.complete { background: var(--green-dim); color: var(--green); }
  .status-badge.active { background: var(--blue-dim); color: var(--blue); }
  .status-badge.planned { background: var(--amber-dim); color: var(--amber); }
  .status-badge.idea { background: var(--purple-dim); color: var(--purple); }
  .status-badge.future { background: rgba(255,255,255,0.05); color: var(--text-dim); }
  .status-badge.quarantined { background: rgba(239,68,68,0.15); color: var(--red); }

  .os-badge {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; border-radius: 4px; padding: 2px 6px;
    height: fit-content; align-self: center;
  }
  .os-badge.ready { background: var(--cyan-dim); color: var(--cyan); }
  .os-badge.partial { background: var(--amber-dim); color: var(--amber); }
  .os-badge.designed { background: var(--purple-dim); color: var(--purple); }
  .os-badge.none { color: var(--text-dim); font-size: 9px; }

  .system-detail {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 16px;
    margin-bottom: 6px;
    display: none;
  }
  .system-detail.visible { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-section h4 { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .detail-section p, .detail-section li { font-size: 13px; color: var(--text-dim); }
  .detail-section ul { list-style: none; padding: 0; }
  .detail-section li { padding: 2px 0; }
  .detail-section li::before { content: "→ "; color: var(--accent); }
  .dep-tag {
    display: inline-block; font-size: 11px; padding: 1px 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; margin: 2px 4px 2px 0; color: var(--text-dim);
  }

  .version-headers {
    display: grid;
    grid-template-columns: 220px repeat(5, 1fr) 100px 80px;
    gap: 4px; padding: 0 10px 8px;
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    padding-top: 8px;
  }
  .vh-center { text-align: center; }

  /* DEPENDENCY VIEW */
  .dep-view { display: none; }
  .dep-view.active { display: block; }
  .dep-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 12px;
  }
  .dep-card h3 { font-size: 14px; margin-bottom: 8px; }
  .dep-chain { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 8px 0; }
  .dep-node {
    padding: 4px 12px; border-radius: 6px; font-size: 12px;
    border: 1px solid var(--border); background: var(--surface2);
  }
  .dep-arrow { color: var(--accent); font-size: 16px; }
  .dep-node.complete { border-color: var(--green); color: var(--green); }
  .dep-node.active { border-color: var(--blue); color: var(--blue); }
  .dep-node.planned { border-color: var(--amber); color: var(--amber); }

  /* OS SEAMS VIEW */
  .os-view { display: none; }
  .os-view.active { display: block; }
  .os-tier { margin-bottom: 24px; }
  .os-tier h3 { font-size: 16px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .os-tier h3 span { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 8px; }
  .os-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px; }
  .os-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
  }
  .os-item .name { font-weight: 600; font-size: 13px; }
  .os-item .note { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .hidden { display: none !important; }

  @media (max-width: 1200px) {
    .system-row, .version-headers {
      grid-template-columns: 180px repeat(5, 1fr) 80px 60px;
    }
  }
  @media (max-width: 900px) {
    .controls, .stats-bar, .main { padding-left: 16px; padding-right: 16px; }
    .header { padding: 20px 16px; }
    .system-row, .version-headers {
      grid-template-columns: 150px repeat(5, 1fr) 70px 50px;
    }
    .version-cell { font-size: 10px; padding: 4px 6px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>StudioLoom <span>System Architecture Map</span></h1>
  <p>Capability maturity matrix — every system tracked across 5 evolutionary versions with dependencies and Loominary OS seam readiness</p>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <input type="text" class="search-box" id="searchBox" placeholder="Search systems...">
  <div class="filter-group" id="statusFilters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="complete" data-active-class="active-green">Built</button>
    <button class="filter-btn" data-filter="active" data-active-class="active-blue">Active</button>
    <button class="filter-btn" data-filter="planned" data-active-class="active-amber">Planned</button>
    <button class="filter-btn" data-filter="idea" data-active-class="active-purple">Idea</button>
    <button class="filter-btn" data-filter="future">Future</button>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" data-view="maturity">Maturity</button>
    <button class="view-tab" data-view="deps">Dependencies</button>
    <button class="view-tab" data-view="os">OS Seams</button>
  </div>
</div>

<div class="main">
  <div id="maturityView" class="dep-view active"></div>
  <div id="depsView" class="dep-view"></div>
  <div id="osView" class="dep-view"></div>
</div>

// RENDER ENGINE
// ═══════════════════════════════════════════════════
const categories = [...new Set(SYSTEMS.map(s => s.category))];
let expandedSystem = null;
let activeStatusFilter = 'all';
let searchQuery = '';
let activeView = 'maturity';

function getStatusClass(status) {
  return status === 'quarantined' ? 'quarantined' : status;
}

function renderStats() {
  const counts = { complete: 0, active: 0, planned: 0, idea: 0, future: 0, quarantined: 0 };
  SYSTEMS.forEach(s => { counts[s.status] = (counts[s.status] || 0) + 1; });
  const total = SYSTEMS.length;
  const osReady = SYSTEMS.filter(s => s.osSeam === 'ready').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="label">Total Systems</div></div>
    <div class="stat complete"><div class="num">${counts.complete}</div><div class="label">Built</div></div>
    <div class="stat active"><div class="num">${counts.active + counts.quarantined}</div><div class="label">Active/WIP</div></div>
    <div class="stat planned"><div class="num">${counts.planned}</div><div class="label">Planned</div></div>
    <div class="stat idea"><div class="num">${counts.idea}</div><div class="label">Idea</div></div>
    <div class="stat future"><div class="num">${counts.future}</div><div class="label">Future</div></div>
    <div class="stat" style="border-left: 1px solid var(--border); padding-left: 24px;">
      <div class="num" style="color: var(--cyan);">${osReady}</div>
      <div class="label">OS-Ready</div>
    </div>
  `;
}

function matchesFilter(sys) {
  if (activeStatusFilter !== 'all' && sys.status !== activeStatusFilter) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const haystack = [sys.name, sys.v1, sys.v2, sys.v3, sys.v4, sys.v5, sys.category, sys.osNotes]
      .filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(q);
  }
  return true;
}

function renderMaturityView() {
  let html = '';
  categories.forEach(cat => {
    const systems = SYSTEMS.filter(s => s.category === cat && matchesFilter(s));
    if (systems.length === 0) return;

    html += `<div class="category-section">
      <div class="category-header" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden');">
        <span class="chevron">▼</span>
        <h2>${cat}</h2>
        <span class="count">${systems.length}</span>
      </div>
      <div>
        <div class="version-headers">
          <div>System</div>
          <div class="vh-center">v1</div>
          <div class="vh-center">v2</div>
          <div class="vh-center">v3</div>
          <div class="vh-center">v4</div>
          <div class="vh-center">v5</div>
          <div class="vh-center">Status</div>
          <div class="vh-center">OS</div>
        </div>
        <div class="system-grid">`;

    systems.forEach(sys => {
      const isExpanded = expandedSystem === sys.id;
      html += `<div class="system-row ${isExpanded ? 'expanded' : ''}" onclick="toggleExpand('${sys.id}')">
        <div class="sys-name">
          <div class="name" title="${sys.name}">${sys.name}</div>
          <div class="sub">${sys.category}</div>
        </div>`;

      for (let v = 1; v <= 5; v++) {
        const text = sys[`v${v}`];
        let cls = 'empty';
        if (text) {
          if (v <= sys.currentVersion) cls = 'current';
          else if (v === sys.currentVersion + 1) cls = 'next';
          else cls = 'filled';
        }
        html += `<div class="version-cell ${cls}" title="${text || 'Not planned yet'}">${text || ''}</div>`;
      }

      html += `<div><span class="status-badge ${getStatusClass(sys.status)}">${sys.status}</span></div>`;
      html += `<div><span class="os-badge ${sys.osSeam}">${sys.osSeam === 'none' ? '—' : sys.osSeam}</span></div>`;
      html += `</div>`;

      // Detail panel
      const depNames = (sys.deps || []).map(d => {
        const dep = SYSTEMS.find(s => s.id === d);
        return dep ? `<span class="dep-tag">${dep.name}</span>` : `<span class="dep-tag">${d}</span>`;
      }).join('');

      const dependents = SYSTEMS.filter(s => (s.deps || []).includes(sys.id))
        .map(s => `<span class="dep-tag">${s.name}</span>`).join('');

      html += `<div class="system-detail ${isExpanded ? 'visible' : ''}" id="detail-${sys.id}">
        <div class="detail-grid">
          <div class="detail-section">
            <h4>Dependencies (needs)</h4>
            <p>${depNames || 'None'}</p>
          </div>
          <div class="detail-section">
            <h4>Dependents (unlocks)</h4>
            <p>${dependents || 'None'}</p>
          </div>
          <div class="detail-section">
            <h4>Loominary OS</h4>
            <p><strong>${sys.osSeam}</strong>: ${sys.osNotes || 'No notes'}</p>
          </div>
          <div class="detail-section">
            <h4>Current Version</h4>
            <p>v${sys.currentVersion} of 5 ${sys.currentVersion === 0 ? '(not started)' : ''}</p>
          </div>
        </div>
      </div>`;
    });

    html += `</div></div></div>`;
  });

  document.getElementById('maturityView').innerHTML = html;
}

function renderDepsView() {
  let html = '<h2 style="margin-bottom: 20px; font-size: 20px;">Key Build Sequences</h2>';

  DEP_CHAINS.forEach(chain => {
    html += `<div class="dep-card">
      <h3>${chain.name}</h3>
      <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 12px;">${chain.description}</p>
      <div class="dep-chain">`;

    chain.chain.forEach((id, i) => {
      const sys = SYSTEMS.find(s => s.id === id);
      if (!sys) return;
      if (i > 0) html += `<span class="dep-arrow">→</span>`;
      html += `<span class="dep-node ${getStatusClass(sys.status)}">${sys.name} <small>(v${sys.currentVersion})</small></span>`;
    });

    html += `</div></div>`;
  });

  // Also show orphan systems (no deps and no dependents)
  const allDeps = new Set();
  const allDependents = new Set();
  SYSTEMS.forEach(s => {
    (s.deps || []).forEach(d => allDeps.add(d));
    if ((s.deps || []).length > 0) allDependents.add(s.id);
  });
  const orphans = SYSTEMS.filter(s => !allDeps.has(s.id) && (s.deps || []).length === 0);

  if (orphans.length > 0) {
    html += `<div class="dep-card">
      <h3>Independent Systems <small style="font-weight: 400; color: var(--text-dim);">(no dependencies)</small></h3>
      <div class="dep-chain" style="flex-wrap: wrap;">`;
    orphans.forEach(sys => {
      html += `<span class="dep-node ${getStatusClass(sys.status)}">${sys.name}</span>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('depsView').innerHTML = html;
}

function renderOsView() {
  const tiers = [
    { key: 'ready', title: 'OS-Ready', desc: 'Can be extracted as shared services with minimal changes' },
    { key: 'designed', title: 'OS-Designed', desc: 'Architecture supports sharing but needs abstraction work' },
    { key: 'partial', title: 'Partially Portable', desc: 'Some product-specific coupling to resolve' },
    { key: 'none', title: 'Product-Specific', desc: 'Intentionally not shared — unique to StudioLoom' }
  ];

  let html = '<h2 style="margin-bottom: 20px; font-size: 20px;">Loominary OS Seam Readiness</h2>';

  tiers.forEach(tier => {
    const systems = SYSTEMS.filter(s => s.osSeam === tier.key && matchesFilter(s));
    if (systems.length === 0) return;

    html += `<div class="os-tier">
      <h3>${tier.title} <span>${tier.desc} (${systems.length})</span></h3>
      <div class="os-items">`;

    systems.forEach(sys => {
      html += `<div class="os-item">
        <div class="name">${sys.name} <span class="status-badge ${getStatusClass(sys.status)}" style="font-size: 9px; padding: 1px 5px;">${sys.status}</span></div>
        <div class="note">${sys.osNotes || sys.category}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('osView').innerHTML = html;
}

function toggleExpand(id) {
  expandedSystem = expandedSystem === id ? null : id;
  renderMaturityView();
}

function render() {
  renderStats();
  renderMaturityView();
  renderDepsView();
  renderOsView();
}

// Event listeners
document.getElementById('searchBox').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.getElementById('statusFilters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('#statusFilters .filter-btn').forEach(b => {
    b.classList.remove('active', 'active-green', 'active-blue', 'active-amber', 'active-purple');
  });
  const activeClass = e.target.dataset.activeClass || 'active';
  e.target.classList.add(activeClass);
  activeStatusFilter = e.target.dataset.filter;
  render();
});

document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeView = tab.dataset.view;
    document.querySelectorAll('.dep-view').forEach(v => v.classList.remove('active'));
    document.getElementById(activeView + 'View').classList.add('active');
  });
});

render();
</script>
</body>
</html>
