# StudioLoom System Registry & Dependency Map
# Machine-readable system registry for impact analysis.
# Scope: SYSTEMS (e.g. "content-safety", "framework-adapter") — 82+ systems.
# For per-TABLE schema state (columns, CHECK constraints, RLS, writers/readers,
# spec drift), see docs/schema-registry.yaml — different scope, same spirit.
# Last updated: 2026-04-16
# When a change is made to any system, trace affected systems via depends_on/affects

systems:
  # STUDENT EXPERIENCE SYSTEMS (30 systems)

  - id: lesson-view
    name: Lesson View & Navigation
    category: Student Experience
    status: complete
    currentVersion: 1
    summary: Interactive lesson display with sidebar navigation, content sections, and autosave response handling. Students navigate between pages and respond to activities.
    depends_on: [activity-blocks, journey-engine, framework-adapter, student-profile, student-data]
    affects: [student-dashboard, portfolio, toolkit, gallery]
    docs:
      - path: docs/specs/lesson-layer-architecture.md
        purpose: Layer architecture for lesson content
      - path: docs/education-ai-patterns.md
        purpose: Effort-gating patterns for student interactions
    data_fields:
      - table: student_progress
        columns: [student_id, unit_id, page_id, responses, integrity_metadata, planning_tasks]
        notes: Primary response storage with autosave via usePageResponses hook
      - table: units
        columns: [id, content_data, nm_config, thumbnail_url]
        notes: Content templates
      - table: class_units
        columns: [id, content_data, nm_config]
        notes: Per-class content forks
    key_files:
      - src/app/student/unit/[unitId]/[pageId]/page.tsx
      - src/components/student/lesson/LessonPageRenderer.tsx
      - src/lib/hooks/usePageResponses.ts
    future_needs: Lesson preview mode for teachers, multi-modal response capture (sketch, voice).
    adrs: ["008", "009"]
    os_seam: ready
    change_impacts: Changes to response autosave affect all student-facing components. Changes to page rendering affect Teaching Mode display and portfolio capture.

