        notes: "Separate from content_moderation_log (migration 067, ingestion-side). Named to avoid collision."
    key_files:
      - src/lib/content-safety/types.ts
      - src/lib/content-safety/client-filter.ts
      - src/lib/content-safety/client-image-filter.ts
      - src/lib/content-safety/server-moderation.ts
      - src/lib/content-safety/moderate-and-log.ts
      - src/lib/content-safety/blocklists/
      - src/app/api/safety/log-client-block/route.ts
      - supabase/migrations/073_content_safety.sql
    wiring_map:
      client_text_choke_points:
        - file: src/hooks/usePageResponses.ts
          role: "Auto-saves all lesson responses + toolkit tool state. All 27 toolkit tools flow through here. Wire checkClientSide() before fetch in saveProgress()."
        - file: src/hooks/useToolSession.ts
          role: "Toolkit tool session persistence (debounced 500ms save). Extract string values from state, check before save."
        - file: src/components/student/DesignAssistantWidget.tsx
          role: "AI mentor chat — student message input. Wire checkClientSide() in sendMessage() before fetch."
        - file: src/components/gallery/GallerySubmitPrompt.tsx
          role: "Gallery submission (contextNote text). Wire before /api/student/gallery/submit fetch."
        - file: src/components/gallery/GalleryBrowser.tsx
          role: "Peer review submission — review text fields. Wire before /api/student/gallery/review POST (~line 171)."
        - file: src/components/quest/EvidenceCapture.tsx
          role: "Quest evidence submission (text, reflection). Wire before /api/student/quest/evidence fetch in handleSubmit()."
        - file: src/hooks/useOpenStudio.ts
          role: "Open Studio sessions — focusArea + reflection text. Wire before /api/student/open-studio/* fetches."
      client_image_choke_points:
        - file: src/components/student/UploadInput.tsx
          role: "Main student file upload. Wire checkClientImage() in handleFile() before fetch. Accepts image/*."
        - file: src/components/portfolio/QuickCaptureFAB.tsx
          role: "Portfolio quick capture — photoFile state. Wire checkClientImage() before submit."
        - file: src/components/quest/EvidenceCapture.tsx
          role: "Quest photo evidence. Wire checkClientImage() for photo type before fetch."
      notes: "Wire checkClientSide() into 7 text choke points and checkClientImage() into 3 image choke points in Phase 5E. ResponseInput.tsx is a renderer that delegates to usePageResponses — not a direct choke point. GalleryFeedbackView.tsx is a reader (GET only) — peer review POST is in GalleryBrowser.tsx."
