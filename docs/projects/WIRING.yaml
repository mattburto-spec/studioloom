  - id: preflight-scanner
    name: "Preflight Scanner Worker (Python on Fly.io)"
    category: Infrastructure
    status: deployed
    currentVersion: 1
    summary: "Python worker on Fly.io (app: preflight-scanner, region: syd, shared-cpu-1x@512MB). Polls fabrication_scan_jobs queue every 5s via claim_next_scan_job RPC (SELECT FOR UPDATE SKIP LOCKED), downloads file from Storage via signed URL, runs rule catalogue (trimesh for STL, svgpathtools for SVG Phase 2B), uploads thumbnails, writes scan results to fabrication_job_revisions + denormalizes onto fabrication_jobs. Deployed 21 Apr 2026 Phase 2A. STL ruleset: stl-v1.0.0 (17 rules, R-STL-01..17). Checkpoint 2.1 passed 21 Apr with prod smoke tests on 3 fixtures (small-cube-25mm known-good, seahorse-not-watertight + chess-pawn-inverted-winding + whale-not-watertight known-broken) and 116 pytest tests passing. 512MB tier needed for >10k-face meshes (OOM on 256MB discovered during Checkpoint 2.1)."
    depends_on: [storage, preflight-pipeline, machine-profiles, admin_settings]
    affects: [preflight-pipeline]
    docs:
      - path: docs/projects/fabrication-pipeline.md
        purpose: "Spec section 12 (worker infra) and sections 5 and 6 (rule catalogues)"
      - path: docs/projects/fabrication/phase-0-decisions.md
        purpose: "D-03 (Fly.io host decision)"
      - path: docs/projects/preflight-phase-1b-1-brief.md
        purpose: "1B-1-4 thumbnail_views shape + 1B-1-6 AI-guardrail keys the worker reads"
    data_fields:
      - table: fabrication_scan_jobs
        columns: [id, job_revision_id, status, attempt_count, locked_by, locked_at, error_detail]
        notes: "Source of truth for scan lifecycle; service_role only (deny-all RLS)"
      - table: fabrication_job_revisions
        columns: [scan_status, scan_results, scan_started_at, scan_completed_at, thumbnail_path, ai_enrichment_cost_usd, thumbnail_views]
        notes: "Worker writes scan outcome + per-scan Haiku cost + multi-angle thumbnail metadata. scan_status denormalized from scan_jobs for display."
      - table: admin_settings
        columns: [key, value]
        notes: "Worker reads preflight.ai_enrichment_enabled / _daily_cap_usd / _tiers_enabled before every Haiku call; sums today's ai_enrichment_cost_usd vs daily cap to gate dispatch."
    external_deps:
      - trimesh
      - svgpathtools
      - lxml
      - matplotlib
      - cairo
      - supabase-py
    future_needs: "CNC, vinyl, embroidery scanners via pluggable registry (v2). Auto-repair deferred per spec — teaching moment beats convenience."
    adrs: []
    os_seam: pluggable-scanner
    change_impacts: "Worker deploys are tied to rule catalogue version string. Changing thresholds = ruleset version bump + worker redeploy. Rule catalogue changes flow to teacher UI via scan-results JSONB shape."

