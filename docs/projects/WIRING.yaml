    summary: "Upload, scan, gate, route, pickup, complete pipeline for student fabrication submissions (3D print, laser). User-facing brand Preflight. Schema tables prefixed fabrication_*. Phase 1A schema applied; Phase 1B-1 (additive columns 098-101 + storage buckets 102 + AI-guardrail seed 103) applied; Phase 1B-2 (teacher invite UI, /fab/login, email dispatch) and Phase 2 (scanner worker + upload UI) upcoming."
