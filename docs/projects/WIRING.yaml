  - id: auth-system
    name: Authentication System
    category: Platform Core
    status: complete
    currentVersion: 1
    summary: "Triple auth: Supabase Auth for teachers, custom token sessions for students, and a separate Fabricator (lab tech) auth with Argon2id-hashed passwords + opaque 32-byte session tokens (Preflight Phase 1B-2). Student login via class code + display name → nanoid(48) token with 7-day TTL. 3-level fallback for multi-class enrollment (junction → legacy class_id → name+teacher match). Fabricator sessions include an is_setup flag that gates the /fab/set-password invite/reset flow and excludes the session from regular /fab/* page access."
    depends_on: []
    affects: [student-signin, teacher-dashboard, teach-mode, preflight-pipeline]
    docs:
      - path: docs/projects/school-readiness.md
