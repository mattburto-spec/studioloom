    data_fields:
      - table: student_sessions
        columns: [id, student_id, token, class_id, created_at, expires_at]
        notes: Token-based sessions
      - table: fabricators
        columns: [id, email, display_name, password_hash, invited_by_teacher_id, is_active]
        notes: Fabricator (lab tech) accounts. password_hash is Argon2id; sentinel value during INVITE_PENDING until /fab/set-password lands.
      - table: fabricator_sessions
        columns: [id, fabricator_id, token_hash, is_setup, expires_at]
        notes: Opaque 32-byte session tokens (stored as SHA-256 hash). is_setup=true means the session only grants access to /fab/set-password (invite/reset flow). Normal login creates is_setup=false sessions.
    key_files:
      - src/lib/auth/student-session.ts
      - src/lib/auth/verify-teacher-unit.ts
      - src/lib/fab/auth.ts
      - src/lib/fab/token.ts
      - src/middleware.ts
    future_needs: LMS SSO integration, QR code login, passwordless teacher auth. Fabricator email verification column + weekly digest. Unified loominary.org-only sender story (currently alerts@studioloom.app still works for cost alerts).
    adrs: ["003"]
