  - id: skills-library
    name: Skills Library — Canonical Content Layer
    category: Content / Curriculum
    status: planned
    currentVersion: 0
    summary: |
      One canonical skill card, many embed contexts (library browse, Stone prereqs, lesson activity blocks, Open Studio capability-gap, crit board pins, badges). Schema: skill_cards + tags + prerequisites + external_links + categories + quizzes. Completions as learning_events → student_skill_state derived view. Six quiz types all gradable without a model. State ladder (not_started → viewed → quiz_passed → demonstrated → mastered) + freshness (current/cooling/stale). Context-aware gating (state × freshness × embed requirement → full card / refresh / skip). Strength radar chart computed on view. Strategic frame — the library is the moat (15 years of teacher-authored material competitors cannot copy). Supersedes self-help-library.md idea. Workshop project ~4-6 days.
    depends_on: [dimensions3, learning-events, student-data]
    affects: [open-studio-mode, lesson-view, student-pm, gallery, safety-badges, student-dashboard, gamification]
    docs:
      - path: docs/projects/skills-library.md
        purpose: Project doc with workshop scope, open questions, next steps
      - path: docs/specs/skills-library-spec.md
        purpose: Base spec (anatomy of skill card, schema, embed contexts, quizzes, badges, authoring phases, maintenance, cross-school sharing as moat)
      - path: docs/specs/skills-library-completion-addendum.md
        purpose: Completion state model, freshness layer, context-aware gating, refresh mode, categories, strength radar chart, privacy/wellbeing rules
      - path: docs/prototypes/strength-chart-prototype.html
        purpose: Radar chart working prototype with state ladder and context-aware gating demo
      - path: docs/projects/self-help-library.md
        purpose: Superseded idea doc — historical reference only
    data_fields:
      - table: skill_cards
        columns: [id, slug, title, body, difficulty, estimated_min, visibility, author_id, school_id, forked_from, created_at, last_reviewed_at]
        notes: Core card table. Body stored as JSONB (ordered content blocks). Visibility = private/school/network/public.
      - table: skill_card_tags
        columns: [skill_id, tag]
        notes: Many-to-many. Flat tag graph over hierarchy.
      - table: skill_prerequisites
        columns: [skill_id, prerequisite_id]
        notes: Directed prerequisite graph, cycle-checked at write time.
      - table: skill_external_links
        columns: [id, skill_id, url, title, link_type, last_checked_at, status]
        notes: Tracked separately for nightly pg_cron link-check.
      - table: skill_quizzes
        columns: [skill_id, questions, pass_threshold, retakes_allowed]
        notes: Optional, one per card. Questions as JSONB array.
      - table: skill_categories
        columns: [id, framework_id, slug, name, description, display_order, axis_label]
        notes: Per-framework category set for strength chart axes (4 for MYP Design criteria).
      - table: skill_card_categories
        columns: [skill_id, category_id, weight]
        notes: Many-to-many with weight for chart computation.
      - table: skill_badge_requirements
        columns: [badge_id, skill_id, requirement_type]
        notes: Future — bridges to badge engine.
      - table: learning_events
        columns: [event_type, payload, student_id, skill_id, created_at]
        notes: New event types — skill.viewed, skill.quiz_passed, skill.quiz_failed, skill.refresh_passed, skill.refresh_acknowledged, skill.demonstrated, skill.applied.
      - view: student_skill_state
        columns: [student_id, skill_id, highest_state, last_used_at, freshness]
        notes: Derived view over learning_events. Cheap on read for v1; materialise overnight via pg_cron if needed at scale.
    key_files: []
    future_needs: |
      Quiz types beyond MC/T/F (image identification, ordering, matching). Badge engine with teacher sign-off workflow. Forking/lineage UI. Cross-school visibility. Strength radar chart visualisation. Mastery derivation from Stone completions. Refresh mode quiz logic. Community contributor marketplace (phase 4).
    adrs: []
    os_seam: ready
    change_impacts: |
      Schema is the foundation. Changes to skill_cards body block types require authoring UI updates. Changes to learning_events skill event types break student_skill_state view. Changes to state score weights or freshness bands in computation logic affect the radar chart without schema change (chart is view-time computation). Open Studio Mode depends on this for capability-gap surfacing. Lesson activity blocks, Stone prereqs, safety badges, and future badge engine all consume skill cards — breaking changes to the card schema ripple wide. Tag governance is a phase 3+ concern; phase 1 = Matt decides.

  - id: open-studio-mode
    name: Open Studio Mode — Studio Desk, Three-Touch Pattern, No-Chatbot Scaffolding
    category: Student Experience
    status: planned
    currentVersion: 0
    summary: |
      Runtime studio experience (not the planning journey). Three-touch pattern: arrival intent (~10s) → passive evidence (session) → departure reflection (~60s, non-dismissable). AI critic silent by default in corner, speaks only on invite / timer elapse / drift signal / blocker keyword. Escalation ladder with rungs 3-4 always teacher actions. Desk view extends existing student-workspace.jsx. No student-facing chatbot — every help moment resolves to a skill card via a join, not a model. Sibling to openstudio-v2 (which specs the Mentor-Guided Planning Journey that produces the plan this mode executes against).
    depends_on: [skills-library, student-open-studio, journey-engine, student-work-pipeline, learning-events, recalibration-ritual, ai-mentor, student-learning-profile]
    affects: [student-dashboard, student-data, teacher-dashboard, parent-updates, intelligence-profiles]
    docs:
      - path: docs/projects/open-studio-mode.md
        purpose: Project doc with REQUIRED READING block — read first before any build work
      - path: docs/open studio/open-studio-mode-spec.md
        purpose: Canonical spec (principles, three-touch, AI behaviour, escalation ladder, UX, integration, open questions)
      - path: docs/open studio/prototypes/open-studio-wireframe.html
        purpose: Desk + reflection drawer wireframes with annotations
      - path: docs/open studio/prototypes/open-studio-reference-prototypes.html
        purpose: 8 reference patterns (Scrum, Strava, Figma, Focusmate, Notion, Destiny, crits, Duolingo)
      - path: docs/open studio/prototypes/student-dashboard-composed.html
        purpose: Composed dashboard (crit board + Stone prereqs + daily template journal)
      - path: docs/open studio/prototypes/SESSION-SUMMARY-apr-2026.md
        purpose: Decision log from April design session — captures decisions not in individual specs
      - path: docs/projects/openstudio-v2.md
        purpose: Sibling project — Mentor-Guided Planning Journey (the plan this mode executes against)
      - path: docs/projects/openstudio.md
        purpose: Original idea doc (superseded but retains early architectural framing)
    data_fields:
      - table: learning_events
        columns: [event_type, payload, student_id, unit_id, created_at]
        notes: New event types required — intent.declared, reflection.session_end, critic.conversation, open_studio.paused, open_studio.revoked
    key_files:
      - src/components/student/student-workspace.jsx (existing — extend for Open Studio default view)
    future_needs: Teacher floor-walk dashboard (own spec), per-class drift threshold tuning UI, parent digest integration, full critic trigger conditions
    adrs: ["008"]
    os_seam: ready
    change_impacts: |
      Depends on Skills Library being in place for capability-gap surfacing (required_skills - earned_skills against student_skill_state view). Changes to learning_events schema affect Wayfinder append-only guarantee. Changes to three-touch event types affect Open Studio v1 backward compatibility — must preserve open_studio_status table. Before building, read the required-reading block in docs/projects/open-studio-mode.md.

