    function mat(color, opts = {}) {
      return new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.05, flatShading: true, ...opts });
    }
    function box(p, w, h, d, c, pos, rot) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(c));
      m.position.set(...pos); if (rot) m.rotation.set(...rot);
      m.castShadow = true; m.receiveShadow = true; p.add(m); return m;
    }
    function cyl(p, rT, rB, h, c, pos, s = 8) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rT, rB, h, s), mat(c));
      m.position.set(...pos); m.castShadow = true; p.add(m); return m;
    }
    function sph(p, r, c, pos) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 8), mat(c));
      m.position.set(...pos); m.castShadow = true; p.add(m); return m;
    }
    function cone(p, r, h, c, pos, s = 6) {
      const m = new THREE.Mesh(new THREE.ConeGeometry(r, h, s), mat(c));
      m.position.set(...pos); m.castShadow = true; p.add(m); return m;
    }
    function plane(p, w, h, c, pos, rot) {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat(c, { side: THREE.DoubleSide }));
      m.position.set(...pos); if (rot) m.rotation.set(...rot); m.receiveShadow = true; p.add(m); return m;
    }

    function buildKit() {
      const k = new THREE.Group(); k.name = "kit";
      // Body
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.6, 8), mat("#7C3AED"));
      torso.position.y = 0.8; k.add(torso);
      // Head
      sph(k, 0.2, "#F5D6B8", [0, 1.3, 0]);
      // Hair
      const hair = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10, 0, Math.PI * 2, 0, Math.PI * 0.55), mat("#4A1D96"));
      hair.position.y = 1.35; k.add(hair);
      // Eyes
      const eGeo = new THREE.SphereGeometry(0.03, 6, 6); const eMat = mat("#1E1B4B");
      const lE = new THREE.Mesh(eGeo, eMat); lE.position.set(-0.07, 1.32, 0.17); k.add(lE);
      const rE = new THREE.Mesh(eGeo, eMat); rE.position.set(0.07, 1.32, 0.17); k.add(rE);
      // Smile
      const smile = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.012, 6, 12, Math.PI), mat("#C4532A"));
      smile.position.set(0, 1.24, 0.17); smile.rotation.x = Math.PI; smile.name = "smile"; k.add(smile);
      // Arms
      const aG = new THREE.CylinderGeometry(0.06, 0.05, 0.4, 6); const aM = mat("#7C3AED");
      const lA = new THREE.Mesh(aG, aM); lA.position.set(-0.32, 0.85, 0); lA.rotation.z = 0.3; lA.name = "leftArm"; k.add(lA);
      const rA = new THREE.Mesh(aG, aM); rA.position.set(0.32, 0.85, 0); rA.rotation.z = -0.3; rA.name = "rightArm"; k.add(rA);
      // Hands
      const hM = mat("#F5D6B8");
      sph(k, 0.05, "#F5D6B8", [-0.42, 0.68, 0]); sph(k, 0.05, "#F5D6B8", [0.42, 0.68, 0]);
      // Legs
      const lG = new THREE.CylinderGeometry(0.07, 0.06, 0.45, 6); const lM = mat("#374151");
      const lL = new THREE.Mesh(lG, lM); lL.position.set(-0.1, 0.3, 0); k.add(lL);
      const rL = new THREE.Mesh(lG, lM); rL.position.set(0.1, 0.3, 0); k.add(rL);
      // Shoes
      const sM = mat("#92400E");
      const lS = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.16), sM); lS.position.set(-0.1, 0.06, 0.03); k.add(lS);
      const rS = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.16), sM); rS.position.set(0.1, 0.06, 0.03); k.add(rS);
      return k;
    }

    function animKit(kit, t, expr = "idle") {
      if (!kit) return;
      kit.position.y = Math.sin(t * 1.5) * 0.02;
      const lA = kit.getObjectByName("leftArm");
      const rA = kit.getObjectByName("rightArm");
      if (lA && rA) {
        if (expr === "wave") { rA.rotation.z = -1.2 + Math.sin(t * 6) * 0.3; lA.rotation.z = 0.3; }
        else if (expr === "celebrate") { lA.rotation.z = 1.0 + Math.sin(t * 4) * 0.15; rA.rotation.z = -1.0 + Math.sin(t * 4 + 1) * 0.15; }
        else if (expr === "think") { rA.rotation.z = -0.8; rA.rotation.x = -0.4; lA.rotation.z = 0.3; }
        else if (expr === "point") { rA.rotation.z = -1.3; rA.rotation.x = -0.2; lA.rotation.z = 0.3; }
        else { lA.rotation.z = 0.3 + Math.sin(t * 2) * 0.05; rA.rotation.z = -0.3 - Math.sin(t * 2) * 0.05; rA.rotation.x = 0; }
      }
      const sm = kit.getObjectByName("smile");
      if (sm) {
        if (expr === "celebrate") sm.scale.set(1.3, 1.3, 1.3);
        else if (expr === "think") { sm.scale.set(0.6, 0.6, 0.6); }
        else sm.scale.set(1, 1, 1);
      }
    }

    // GLB ASSET LOADER (Kenney packs)
    // ═══════════════════════════════════════════════════════════════

    // Paths relative to THIS file (which lives inside 3delements/)
    // Space in folder name must be URL-encoded for fetch/XHR
    const FURN = "kenney_furniture-kit/Models/GLTF%20format/";
    const NATR = "kenney_nature-kit/Models/GLTF%20format/";
    const _glbCache = {};
    const _gltfLoader = new THREE.GLTFLoader();

    function loadGLB(path, parent, pos, scale = 1, rotY = 0) {
      function place(m) {
        m.position.set(...pos);
        if (typeof scale === "number") m.scale.set(scale, scale, scale); else m.scale.set(...scale);
        m.rotation.y = rotY;
        m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        parent.add(m);
        // Hide primitive fallbacks once any GLB loads for this env group
        const fb = parent.getObjectByName("fallbacks");
        if (fb) fb.visible = false;
      }
      if (_glbCache[path]) { place(_glbCache[path].clone()); return; }
      _gltfLoader.load(path, (gltf) => {
        _glbCache[path] = gltf.scene.clone();
        place(gltf.scene);
      }, undefined, (err) => { console.warn("GLB load failed:", path, err); });
    }
