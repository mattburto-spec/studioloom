    // ── GEOMETRY BUILDERS ──

    function createPlatform(radius, height, color, edgeColor) {
      const group = new THREE.Group();
      const geo = new THREE.CylinderGeometry(radius, radius * 1.05, height, 32);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.1 });
      const platform = new THREE.Mesh(geo, mat);
      platform.position.y = -height / 2;
      platform.receiveShadow = true;
      group.add(platform);

      const ringGeo = new THREE.TorusGeometry(radius * 1.02, 0.04, 8, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color: edgeColor });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.01;
      ring.name = "edgeRing";
      group.add(ring);

      const underGeo = new THREE.CircleGeometry(radius * 1.1, 32);
      const underMat = new THREE.MeshBasicMaterial({ color: edgeColor, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
      const underglow = new THREE.Mesh(underGeo, underMat);
      underglow.rotation.x = -Math.PI / 2;
      underglow.position.y = -height;
      group.add(underglow);

      return group;
    }

    function createBackdropShell(radius, height, color, emissiveColor) {
      const group = new THREE.Group();
      const shellGeo = new THREE.CylinderGeometry(radius, radius, height, 48, 1, true, Math.PI * 0.05, Math.PI * 0.9);
      const shellMat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.05, side: THREE.DoubleSide });
      const shell = new THREE.Mesh(shellGeo, shellMat);
      shell.position.y = height / 2;
      shell.rotation.y = Math.PI / 2;
      group.add(shell);

      const trimGeo = new THREE.TorusGeometry(radius * 0.99, 0.03, 8, 48, Math.PI * 0.88);
      const trimMat = new THREE.MeshBasicMaterial({ color: emissiveColor });
      const trim = new THREE.Mesh(trimGeo, trimMat);
      trim.rotation.x = -Math.PI / 2;
      trim.rotation.z = Math.PI * 0.06;
      trim.position.y = height;
      group.add(trim);

      return group;
    }

    function createParticles(count, spread, color, yRange) {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        positions[i*3] = (Math.random() - 0.5) * spread;
        positions[i*3+1] = yRange[0] + Math.random() * (yRange[1] - yRange[0]);
        positions[i*3+2] = (Math.random() - 0.5) * spread;
      }
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color, size: 0.05, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false });
      return new THREE.Points(geo, mat);
    }

    function createStarField(count) {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const r = 30 + Math.random() * 20;
        positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.cos(phi);
        positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
      }
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: "#FEF3C7", size: 0.08, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false });
      return new THREE.Points(geo, mat);
    }

    function createEmissiveAccent(type, color, pos, scale) {
      let geo;
      if (type === "crystal") geo = new THREE.OctahedronGeometry(0.2 * scale, 0);
      else if (type === "orb") geo = new THREE.SphereGeometry(0.15 * scale, 16, 16);
      else geo = new THREE.IcosahedronGeometry(0.18 * scale, 0);
      const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.8, roughness: 0.2, metalness: 0.3, transparent: true, opacity: 0.9 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(...pos);
      mesh.name = "emissive_accent";
      return mesh;
    }

    // ── GLB LOADER ──
    const _glbCache = {};
    const _gltfLoader = new GLTFLoader();

    function loadGLB(path, parent, pos, scale, rotY) {
      function place(m) {
        m.position.set(...pos);
        if (typeof scale === "number") m.scale.set(scale, scale, scale);
        else m.scale.set(...scale);
        m.rotation.y = rotY;
        m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        parent.add(m);
      }
      if (_glbCache[path]) { place(_glbCache[path].clone()); return; }
      _gltfLoader.load(path, (gltf) => {
        _glbCache[path] = gltf.scene.clone();
        place(gltf.scene);
      }, undefined, (err) => console.warn("GLB failed:", path, err));
    }

    // ── STATION BUILDER ──

    function buildStation(scene, station) {
      const group = new THREE.Group();
      group.name = `station_${station.id}`;
      const c = station.colors;

      // Platform
      const platform = createPlatform(5.5, 0.5, c.floor, c.edgeGlow);
      group.add(platform);

      // Backdrop
      const shell = createBackdropShell(6.5, 5.5, c.shell, c.emissive);
      shell.position.z = -1;
      group.add(shell);

      // Lighting
      group.add(new THREE.AmbientLight(c.ambient, 0.3));

      const keyLight = new THREE.DirectionalLight("#FFF5E1", 0.7);
      keyLight.position.set(3, 8, 5);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.set(1024, 1024);
      keyLight.shadow.camera.near = 0.5;
      keyLight.shadow.camera.far = 25;
      keyLight.shadow.camera.left = -8;
      keyLight.shadow.camera.right = 8;
      keyLight.shadow.camera.top = 8;
      keyLight.shadow.camera.bottom = -8;
      keyLight.shadow.bias = -0.001;
      group.add(keyLight);

      const fillLight = new THREE.PointLight(c.primary, 0.5, 15);
      fillLight.position.set(-4, 3, 3);
      group.add(fillLight);

      const accentLight = new THREE.PointLight(c.emissive, 0.4, 12);
      accentLight.position.set(0, 2, -5);
      group.add(accentLight);

      // Emissive accents
      [
        createEmissiveAccent("crystal", c.emissive, [-4.5, 0.3, -2.5], 1.2),
        createEmissiveAccent("orb", c.accent, [4.2, 1.5, -1], 0.8),
        createEmissiveAccent("crystal", c.emissive, [-2, 0.2, 3], 0.6),
        createEmissiveAccent("icosa", c.accent, [3.5, 0.4, 2.5], 0.9),
      ].forEach(a => group.add(a));

      // Particles
      const particles = createParticles(60, 12, c.accent, [0.3, 5]);
      particles.name = "particles";
      group.add(particles);

      // Props
      (STATION_PROPS[station.env] || []).forEach(p => loadGLB(p.path, group, p.pos, p.scale, p.rotY));

      // Station-specific
      if (station.env === "campfire") {
        const fireLight = new THREE.PointLight("#FF6B00", 1.2, 8);
        fireLight.position.set(0, 0.8, 0);
        fireLight.name = "fireLight";
        group.add(fireLight);
        [["#EF4444", 0.3, 0.8], ["#F97316", 0.2, 0.6], ["#FCD34D", 0.12, 0.4]].forEach(([col, r, h], i) => {
          const mat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.85 - i * 0.1 });
          const cone = new THREE.Mesh(new THREE.ConeGeometry(r, h, 8), mat);
          cone.position.set((Math.random()-0.5)*0.05, 0.15+h/2, (Math.random()-0.5)*0.05);
          cone.name = "flame_" + i;
          group.add(cone);
        });
      }

      if (station.env === "gallery") {
        const frameColors = ["#FCD34D", "#A5B4FC", "#F9A8D4", "#86EFAC", "#FCA5A5"];
        frameColors.forEach((fc, i) => {
          const angle = (i / frameColors.length) * Math.PI * 0.7 + Math.PI * 0.15;
          const x = Math.sin(angle) * 6;
          const z = -Math.cos(angle) * 6;
          const fg = new THREE.Group();
          fg.add(new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.2, 0.06), new THREE.MeshStandardMaterial({ color: "#FFF7ED", roughness: 0.9 })));
          const canvas = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.0, 0.04), new THREE.MeshStandardMaterial({ color: fc, emissive: fc, emissiveIntensity: 0.15 }));
          canvas.position.z = 0.02;
          fg.add(canvas);
          fg.position.set(x, 2.5, z - 1);
          fg.lookAt(0, 2.5, 0);
          group.add(fg);
        });
      }

      if (station.env === "corridor") {
        for (let i = -2; i <= 2; i++) {
          const line = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.02, 1.2),
            new THREE.MeshBasicMaterial({ color: c.emissive, transparent: true, opacity: 0.5 + Math.abs(i) * 0.1 })
          );
          line.position.set(i * 1.2, 0.02, i * 0.5);
          group.add(line);
        }
      }

      if (station.env === "rooftop") {
        group.add(createParticles(100, 18, "#FBCFE8", [1, 8]));
        const beam = new THREE.Mesh(
          new THREE.CylinderGeometry(0.3, 0.6, 8, 16, 1, true),
          new THREE.MeshBasicMaterial({ color: c.emissive, transparent: true, opacity: 0.08, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
        );
        beam.position.set(0, 4, -2.5);
        beam.name = "launchBeam";
        group.add(beam);
      }

      scene.add(group);
      return group;
    }

    // ── ANIMATION ──

    function animateStation(group, clock) {
      const t = clock.getElapsedTime();

      const particles = group.getObjectByName("particles");
      if (particles) {
        const pos = particles.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          pos.array[i*3+1] += Math.sin(t * 0.5 + i) * 0.001;
          if (pos.array[i*3+1] > 6) pos.array[i*3+1] = 0.3;
        }
        pos.needsUpdate = true;
        particles.rotation.y = t * 0.02;
      }

      const ring = group.getObjectByName("edgeRing");
      if (ring) { ring.material.opacity = 0.5 + Math.sin(t * 1.5) * 0.3; ring.material.transparent = true; }

      group.children.forEach(child => {
        if (child.name === "emissive_accent") {
          child.position.y += Math.sin(t * 0.8 + child.position.x) * 0.0008;
          child.rotation.y = t * 0.3;
          child.rotation.z = Math.sin(t * 0.5) * 0.1;
        }
      });

      const fireLight = group.getObjectByName("fireLight");
      if (fireLight) { fireLight.intensity = 1.0 + Math.sin(t*8)*0.3 + Math.sin(t*12.5)*0.15; fireLight.position.x = Math.sin(t*3)*0.05; }

      for (let i = 0; i < 3; i++) {
        const flame = group.getObjectByName("flame_"+i);
        if (flame) { flame.position.x = Math.sin(t*(4+i*2))*0.04; flame.position.z = Math.cos(t*(3+i*1.5))*0.04; flame.scale.y = 1+Math.sin(t*(6+i*3))*0.15; }
      }

      const beam = group.getObjectByName("launchBeam");
      if (beam) { beam.material.opacity = 0.05+Math.sin(t*0.8)*0.04; beam.rotation.y = t*0.2; }
    }

    // ── MAIN APP ──

    const root = document.getElementById("root");
    let currentStation = -1;  // Start at -1 so switchStation(0) actually fires
    let stationGroup = null;
    const clock = new THREE.Clock();

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    if (renderer.outputColorSpace !== undefined) renderer.outputColorSpace = THREE.SRGBColorSpace;
    else renderer.outputEncoding = THREE.sRGBEncoding;

    // Scene & Camera
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);

    // Stars
    const starField = createStarField(500);
    scene.add(starField);

    // DOM
    root.innerHTML = "";
    root.appendChild(renderer.domElement);

    // UI overlay
    const ui = document.createElement("div");
    ui.style.cssText = "position:absolute;inset:0;pointer-events:none;font-family:'Inter',system-ui,sans-serif;";
    root.appendChild(ui);

    function renderUI() {
      const s = STATIONS[currentStation];
      ui.innerHTML = `
        <div style="position:absolute;top:24px;left:24px;color:#fff;pointer-events:none">
          <div style="font-size:11px;font-weight:600;letter-spacing:2px;color:${s.colors.accent};text-transform:uppercase;margin-bottom:4px">Station ${s.id+1} of ${STATIONS.length}</div>
          <div style="font-size:28px;font-weight:700;margin-bottom:2px">${s.name}</div>
          <div style="font-size:14px;opacity:0.6">${s.subtitle}</div>
        </div>
        <div style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:rgba(0,0,0,0.5);border-radius:20px;padding:8px 16px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);pointer-events:auto">
          ${STATIONS.map((st,i) => `<button onclick="window._goStation(${i})" style="width:${i===currentStation?36:12}px;height:12px;border-radius:6px;border:none;cursor:pointer;background:${i===currentStation?st.colors.primary:'rgba(255,255,255,0.2)'};transition:all 0.3s" title="${st.name}"></button>`).join("")}
        </div>
        <div style="position:absolute;top:24px;right:24px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:auto">
          ${STATIONS.map((st,i) => `<button onclick="window._goStation(${i})" style="padding:4px 12px;border-radius:12px;border:${i===currentStation?`1px solid ${st.colors.accent}`:'1px solid rgba(255,255,255,0.08)'};background:${i===currentStation?st.colors.primary+'30':'rgba(0,0,0,0.3)'};color:${i===currentStation?st.colors.accent:'rgba(255,255,255,0.35)'};cursor:pointer;font-size:11px;font-weight:500;font-family:'Inter',system-ui,sans-serif;backdrop-filter:blur(8px)">${st.name}</button>`).join("")}
        </div>
        <div style="position:absolute;bottom:24px;right:24px;display:flex;gap:8px;pointer-events:auto">
          <button onclick="window._goStation(${Math.max(0,currentStation-1)})" style="width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.4);color:${currentStation===0?'rgba(255,255,255,0.2)':'#fff'};cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)">&#8592;</button>
          <button onclick="window._goStation(${Math.min(STATIONS.length-1,currentStation+1)})" style="width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.4);color:${currentStation===STATIONS.length-1?'rgba(255,255,255,0.2)':'#fff'};cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)">&#8594;</button>
        </div>
      `;
    }

    function switchStation(idx) {
      if (idx === currentStation || idx < 0 || idx >= STATIONS.length) return;
      currentStation = idx;
      const s = STATIONS[idx];

      // Clean old
      if (stationGroup) {
        scene.remove(stationGroup);
        stationGroup.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
          }
        });
      }

      scene.fog = new THREE.FogExp2(s.colors.fog, 0.035);
      scene.background = new THREE.Color(s.colors.bg);
      stationGroup = buildStation(scene, s);
      camera.position.set(...s.cameraPos);
      camera.lookAt(...s.cameraTarget);
      renderUI();
    }

    window._goStation = switchStation;

    // Keyboard nav
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === "d") switchStation(currentStation + 1);
      if (e.key === "ArrowLeft" || e.key === "a") switchStation(currentStation - 1);
    });

    // Init first station
    switchStation(0);

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      if (stationGroup) animateStation(stationGroup, clock);
      starField.rotation.y += 0.0001;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
