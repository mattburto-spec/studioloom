name: Cron Ops

# Wires up the two compliance-load-bearing scripts in scripts/ops/.
# Resolves FU-AV2-CRON-SCHEDULER-WIRE (P2) for retention + hard-delete.
# Other ops scripts (cost-alert, stale-watchdog, pipeline-health,
# quality-drift, edit-tracker, usage-analytics) can be added here later.

on:
  schedule:
    # Daily — midnight Nanjing (UTC+8) = 16:00 UTC. Two hours before nightly.yml
    # so the scheduled hard-delete pass finishes before code gates run.
    - cron: "0 16 * * *"
    # Monthly — 1st of month at 1am Nanjing = 17:00 UTC on the 1st.
    - cron: "0 17 1 * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "hard-delete"
        type: choice
        options:
          - hard-delete
          - retention-enforcement

jobs:
  hard-delete:
    # Runs daily AND on manual dispatch when job=hard-delete
    if: github.event.schedule == '0 16 * * *' || github.event.inputs.job == 'hard-delete'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Scheduled hard-delete cron
        run: npx tsx scripts/ops/run-scheduled-hard-delete.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  retention-enforcement:
    # Runs monthly AND on manual dispatch when job=retention-enforcement
    if: github.event.schedule == '0 17 1 * *' || github.event.inputs.job == 'retention-enforcement'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Retention enforcement
        run: npx tsx scripts/ops/run-retention-enforcement.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
