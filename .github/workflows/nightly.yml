name: Nightly

on:
  schedule:
    # 2am Nanjing time (UTC+8) = 6pm UTC
    - cron: "0 18 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit --project tsconfig.check.json

      - name: Tests
        run: npm test

      - name: Dashboard sync check
        run: npx tsx scripts/check-dashboard-sync.ts
        continue-on-error: true

      - name: Doc freshness check
        run: npx tsx scripts/check-doc-freshness.ts

      - name: WIRING.yaml health check
        run: python3 scripts/check-wiring-health.py

      - name: Audit-coverage gate (Phase 6.4 — gating since 4 May 2026)
        # Emits docs/scanner-reports/audit-coverage.json AND fails the build
        # if any mutation route lacks logAuditEvent OR an `// audit-skip:`
        # annotation. Phase 6.4 closed the original 224-route gap via
        # bulk-skip + 3 inline-wires (admin/teachers DELETE+invite POST,
        # admin/teacher-requests PATCH). Any new mutation route from now on
        # must either call logAuditEvent or carry an audit-skip with a
        # non-trivial reason — same discipline as the AI budget gate.
        run: python3 scripts/registry/scan-api-routes.py --check-audit-coverage --fail-on-missing

      - name: AI budget-coverage gate (Phase 5.3d — gating from day one)
        # Emits docs/scanner-reports/ai-budget-coverage.json. Gates the build
        # on missing > 0 (current state: 3 covered / 0 skipped / 0 missing).
        # Any future student AI route added without `withAIBudget()` (or
        # `// budget-skip: <reason>` annotation) fails this step.
        run: python3 scripts/registry/scan-api-routes.py --check-budget-coverage --fail-on-missing

      # Runtime ops jobs (retention enforcement + scheduled hard-delete) live
      # in cron-ops.yml on their own schedule. nightly.yml is code gates only.

      - name: Full build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
