name: Nightly

on:
  schedule:
    # 2am Nanjing time (UTC+8) = 6pm UTC
    - cron: "0 18 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit --project tsconfig.check.json

      - name: Tests
        run: npm test

      - name: Dashboard sync check
        run: npx tsx scripts/check-dashboard-sync.ts

      - name: Doc freshness check
        run: npx tsx scripts/check-doc-freshness.ts

      - name: WIRING.yaml health check
        run: python3 scripts/check-wiring-health.py

      - name: Audit-coverage scanner (Phase 5.1d — visibility-only until catchup FU closes)
        # Emits docs/scanner-reports/audit-coverage.json. Currently does NOT
        # gate the build (228 mutation routes inherited from Phase 4 still
        # need triage; tracked as FU-AV2-AUDIT-MISSING-PHASE-6-CATCHUP P2).
        # When that FU closes, swap this for `--check-audit-coverage --fail-on-missing`.
        run: python3 scripts/registry/scan-api-routes.py --check-audit-coverage

      - name: Full build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
