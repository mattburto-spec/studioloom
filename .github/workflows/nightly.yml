name: Nightly

on:
  schedule:
    # 2am Nanjing time (UTC+8) = 6pm UTC
    - cron: "0 18 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit --project tsconfig.check.json

      - name: Tests
        run: npm test

      - name: Dashboard sync check
        run: npx tsx scripts/check-dashboard-sync.ts

      - name: Doc freshness check
        run: npx tsx scripts/check-doc-freshness.ts

      - name: WIRING.yaml health check
        run: python3 scripts/check-wiring-health.py

      - name: Audit-coverage scanner (Phase 5.1d — visibility-only until catchup FU closes)
        # Emits docs/scanner-reports/audit-coverage.json. Currently does NOT
        # gate the build (228 mutation routes inherited from Phase 4 still
        # need triage; tracked as FU-AV2-AUDIT-MISSING-PHASE-6-CATCHUP P2).
        # When that FU closes, swap this for `--check-audit-coverage --fail-on-missing`.
        run: python3 scripts/registry/scan-api-routes.py --check-audit-coverage

      - name: AI budget-coverage gate (Phase 5.3d — gating from day one)
        # Emits docs/scanner-reports/ai-budget-coverage.json. Gates the build
        # on missing > 0 (current state: 3 covered / 0 skipped / 0 missing).
        # Any future student AI route added without `withAIBudget()` (or
        # `// budget-skip: <reason>` annotation) fails this step.
        run: python3 scripts/registry/scan-api-routes.py --check-budget-coverage --fail-on-missing

      # Phase 5.5 cron entry points exist at:
      #   scripts/ops/run-retention-enforcement.ts
      #   scripts/ops/run-scheduled-hard-delete.ts
      # NOT wired here — nightly.yml is for code gates, not runtime jobs
      # (cost-alert.ts pattern is the same — script ships, scheduling decided
      # separately). Tracked as FU-AV2-CRON-SCHEDULER-WIRE P2 — needs a call
      # on Vercel cron vs GitHub Actions schedule vs external scheduler +
      # secret-management for SUPABASE_SERVICE_ROLE_KEY.

      - name: Full build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
