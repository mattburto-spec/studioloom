name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # FU-6: legacy ESLint backlog (hundreds of pre-existing
      # @typescript-eslint/no-explicit-any + no-unused-vars in src/lib/pipeline,
      # src/lib/safety/modules, tests/, etc.). Lint is reported but not blocking
      # so new commits don't fail CI on legacy debt. Cleanup tracked in
      # docs/projects/dimensions3-followups.md.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit --project tsconfig.check.json

      - name: Tests
        run: npm test

      - name: Dashboard sync check
        run: npx tsx scripts/check-dashboard-sync.ts

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
